<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; height: auto; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; cursor: pointer; font-size: 18px; color: rgba(255, 255, 255, 0.8); text-decoration: none; transition: 0.2s; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 40px 50px; display: flex; align-items: center; gap: 20px; }
        .search-container { position: relative; flex: 1; max-width: 500px; }
        .search-bar { width: 100%; padding: 18px 15px 18px 65px; border-radius: 40px; border: 1px solid #e0e0e0; background-color: white; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; object-fit: contain; }
        .header-right { display: flex; align-items: center; gap: 20px; margin-left: auto; }
        .add-button { background-color: #ffffff; border: 2px solid #6fceca; color: #6fceca; border-radius: 30px; padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .add-button:hover { background-color: #6fceca; color: white; }
        .sort-button { background: none; border: none; cursor: pointer; padding: 0; display: flex; }
        .sort-button img { height: 55px; width: auto; }
        .card-grid { padding: 0 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; border: 1px solid #f0f0f0; cursor: pointer; }
        .user-thumb { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #f0faff; }
        .card-name { font-weight: bold; font-size: 20px; color: #333; margin-bottom: 5px; }
        .card-company { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>
    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" placeholder="キーワードを入力">
            </div>
            <div class="header-right">
                <button class="add-button">＋ 追加</button>
                <button class="sort-button"><img src="btn-sort.png" alt="並び替え"></button>
            </div>
        </div>
        <div class="card-grid">
            <div class="card">
                <img src="user-1.png" class="user-thumb">
                <div class="card-info"><div class="card-name">田中 太郎</div><div class="card-company">株式会社サンプル</div></div>
            </div>
        </div>
    </div>
</body>
</html>
