<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        
        /* サイドバー共通デザイン */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding-top: 60px; color: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .logo-area { padding: 0 20px 60px; text-align: center; }
        .logo-area img { width: 80%; height: auto; }
        .nav-item { display: flex; align-items: center; padding: 25px 30px; cursor: pointer; font-size: 18px; color: rgba(255, 255, 255, 0.8); text-decoration: none; transition: 0.2s; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 30px; margin-right: 15px; }

        .main-content { flex: 1; display: flex; flex-direction: column; }
        
        /* ヘッダーエリア */
        .header { padding: 40px 50px; display: flex; align-items: center; gap: 20px; }
        .search-container { position: relative; flex: 1; max-width: 500px; }
        .search-bar { width: 100%; padding: 18px 20px 18px 60px; border-radius: 40px; border: 1px solid #e0e0e0; font-size: 16px; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); width: 24px; opacity: 0.4; }
        
        .add-button { background-color: #ffffff; border: 2px solid #6fceca; color: #6fceca; border-radius: 30px; padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .add-button:hover { background-color: #6fceca; color: white; }

        /* 名刺カード一覧 */
        .card-grid { padding: 0 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; border: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .user-thumb { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #f0faff; object-fit: cover; }
        .card-name { font-weight: bold; font-size: 18px; color: #333; margin-bottom: 5px; }
        .card-dept { color: #6fceca; font-size: 14px; font-weight: bold; }

        /* モーダル */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: white; width: 450px; border-radius: 30px; padding: 40px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 24px; border: none; background: none; cursor: pointer; color: #ccc; }
        .form-group { margin-bottom: 20px; }
        .form-label { font-size: 12px; color: #999; font-weight: bold; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; background: #f9f9f9; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; background: #6fceca; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="名刺くらうど"></div>
        <a href="index.html" class="nav-item active">🔍 キーワード</a>
        <a href="dept.html" class="nav-item">📁 部署</a>
        <a href="area.html" class="nav-item">📍 エリア</a>
    </div>
    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="search-icon.png" class="search-icon">
                <input type="text" class="search-bar" placeholder="名前や会社名で検索">
            </div>
            <button class="add-button" onclick="toggleModal(true)">＋ 名刺を追加</button>
        </div>
        <div class="card-grid" id="cardGrid">
            </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-btn" onclick="toggleModal(false)">×</button>
            <h2 style="text-align:center; color:#333;">名刺の登録</h2>
            <div class="form-group"><label class="form-label">お名前</label><input type="text" class="form-input" id="nameInp"></div>
            <div class="form-group"><label class="form-label">部署</label><input type="text" class="form-input" id="deptInp"></div>
            <button class="submit-btn" onclick="addCard()">この内容で登録する</button>
        </div>
    </div>

    <script>
        const data = [
            { name: "田中 太郎", dept: "制作技術部", img: "user1.png" },
            { name: "佐藤 花子", dept: "報道制作部", img: "user2.png" }
        ];

        function render() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.img}" class="user-thumb">
                    <div>
                        <div class="card-name">${item.name}</div>
                        <div class="card-dept">${item.dept}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleModal(show) {
            document.getElementById('modalOverlay').classList.toggle('open', show);
        }

        function addCard() {
            const name = document.getElementById('nameInp').value;
            const dept = document.getElementById('deptInp').value;
            if(name && dept) {
                data.push({ name, dept, img: "user1.png" });
                render();
                toggleModal(false);
            }
        }
        render();
    </script>
</body>
</html>
