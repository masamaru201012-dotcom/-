<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        
        /* サイドメニュー */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; height: auto; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; cursor: pointer; font-size: 18px; color: rgba(255, 255, 255, 0.8); text-decoration: none; transition: 0.2s; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }

        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 40px 50px; display: flex; align-items: center; gap: 20px; }
        .search-container { position: relative; flex: 1; max-width: 500px; }
        .search-bar { width: 100%; padding: 18px 15px 18px 65px; border-radius: 40px; border: 1px solid #e0e0e0; background-color: white; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; object-fit: contain; }

        .header-right { display: flex; align-items: center; gap: 20px; margin-left: auto; }
        .add-button { background-color: #ffffff; border: 2px solid #6fceca; color: #6fceca; border-radius: 30px; padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .add-button:hover { background-color: #6fceca; color: white; }

        /* カード一覧 */
        .card-grid { padding: 0 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; border: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .user-thumb { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #f0faff; background: #eee; }

        .card-info { display: flex; flex-direction: column; }
        .card-name { font-weight: bold; font-size: 20px; color: #333; margin-bottom: 5px; }
        .card-company { color: #666; font-size: 14px; }

        /* モーダル */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 30px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-button { position: absolute; top: 20px; right: 25px; font-size: 30px; background: none; border: none; color: #ccc; cursor: pointer; }

        .modal-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0faff; padding-bottom: 20px; }
        
        /* 登録用アイコン（クリック可能） */
        .modal-thumb-upload { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #f0faff; margin-bottom: 15px; cursor: pointer; object-fit: cover; background: #eee; transition: 0.3s; }
        .modal-thumb-upload:hover { opacity: 0.7; }
        .upload-hint { font-size: 10px; color: #6fceca; margin-top: -10px; margin-bottom: 10px; font-weight: bold; }

        .modal-body { display: flex; flex-direction: column; gap: 12px; }
        .info-group { display: flex; flex-direction: column; }
        .info-label { font-size: 11px; color: #aaa; font-weight: bold; margin-bottom: 3px; }
        .info-input, .info-value { font-size: 15px; color: #444; background: #f8f9fa; padding: 10px 15px; border-radius: 10px; border: 1px solid #f0f0f0; }
        .info-input { outline: none; }
        .info-input:focus { border-color: #6fceca; background: white; }

        .register-button { background: #6fceca; color: white; border: none; border-radius: 30px; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" placeholder="名前や部署で検索" id="searchBar">
            </div>
            <div class="header-right">
                <button class="add-button" onclick="openAddModal()">＋ 追加</button>
            </div>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="previewImage(event)">

    <script>
        // 1. データの読み込み（localStorageから取得）
        let userData = JSON.parse(localStorage.getItem('myCards')) || [
            { id: 1, name: '田中 太郎', company: '三重テレビ放送', dept: '制作技術部', title: '部長', email: 'tanaka@test.com', phone: '059-000-0000', notes: '技術局長', icon: 'user-default.png' }
        ];

        let tempImageData = 'user-default.png';

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const searchWord = document.getElementById('searchBar').value.toLowerCase();
            grid.innerHTML = '';
            
            userData.filter(u => u.name.toLowerCase().includes(searchWord) || u.dept.toLowerCase().includes(searchWord)).forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetailModal(user);
                card.innerHTML = `
                    <img src="${user.icon}" class="user-thumb" onerror="this.src='user-default.png'">
                    <div class="card-info">
                        <div class="card-name">${user.name}</div>
                        <div class="card-company">${user.company}</div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        // 登録用モーダル：アイコンクリックで画像アップロード可能
        function openAddModal() {
            tempImageData = 'user-default.png'; // 初期化
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <button class="close-button" onclick="closeModal()">×</button>
                <div class="modal-header">
                    <img src="${tempImageData}" class="modal-thumb-upload" id="targetIcon" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-hint">↑ 写真をクリックして変更</div>
                    <div class="modal-name">新規名刺登録</div>
                </div>
                <div class="modal-body">
                    <div class="info-group"><label class="info-label">名前</label><input type="text" id="newName" class="info-input"></div>
                    <div class="info-group"><label class="info-label">会社名</label><input type="text" id="newCompany" class="info-input" value="三重テレビ放送"></div>
                    <div class="info-group"><label class="info-label">部署名</label><input type="text" id="newDept" class="info-input"></div>
                    <div class="info-group"><label class="info-label">役職</label><input type="text" id="newTitle" class="info-input"></div>
                    <div class="info-group"><label class="info-label">メールアドレス</label><input type="text" id="newEmail" class="info-input"></div>
                    <div class="info-group"><label class="info-label">電話番号</label><input type="text" id="newPhone" class="info-input"></div>
                    <div class="info-group"><label class="info-label">備考</label><input type="text" id="newNotes" class="info-input"></div>
                    <button class="register-button" onclick="registerCard()">この内容で登録</button>
                </div>`;
            document.getElementById('modalOverlay').classList.add('open');
        }

        // 画像選択時のプレビュー処理
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImageData = e.target.result; // Base64データ
                document.getElementById('targetIcon').src = tempImageData;
            };
            reader.readAsDataURL(file);
        }

        function registerCard() {
            const name = document.getElementById('newName').value;
            if(!name) return alert("名前を入力してください");

            const newUser = {
                id: Date.now(),
                name: name,
                company: document.getElementById('newCompany').value,
                dept: document.getElementById('newDept').value || "未設定",
                title: document.getElementById('newTitle').value,
                email: document.getElementById('newEmail').value,
                phone: document.getElementById('newPhone').value,
                notes: document.getElementById('newNotes').value,
                icon: tempImageData
            };
            userData.push(newUser);
            localStorage.setItem('myCards', JSON.stringify(userData)); // 保存！
            renderCards();
            closeModal();
        }

        function openDetailModal(user) {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <button class="close-button" onclick="closeModal()">×</button>
                <div class="modal-header">
                    <img src="${user.icon}" class="modal-thumb-upload" onerror="this.src='user-default.png'">
                    <div class="modal-name">${user.name}</div>
                </div>
                <div class="modal-body">
                    <div class="info-group"><div class="info-label">会社名</div><div class="info-value">${user.company}</div></div>
                    <div class="info-group"><div class="info-label">部署名</div><div class="info-value">${user.dept}</div></div>
                    <div class="info-group"><div class="info-label">役職</div><div class="info-value">${user.title || '---'}</div></div>
                    <div class="info-group"><div class="info-label">メールアドレス</div><div class="info-value">${user.email || '---'}</div></div>
                    <button onclick="deleteCard(${user.id})" style="background:none; border:none; color:#ff7675; cursor:pointer; margin-top:10px; font-size:12px;">名刺を削除する</button>
                </div>`;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function deleteCard(id) {
            if(!confirm("削除しますか？")) return;
            userData = userData.filter(u => u.id !== id);
            localStorage.setItem('myCards', JSON.stringify(userData));
            renderCards();
            closeModal();
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        document.getElementById('searchBar').addEventListener('input', renderCards);
        renderCards();
    </script>
</body>
</html>
