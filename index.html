<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - エリア詳細選択版</title>
    <style>
        html { visibility: hidden; }
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }

        /* 既存スタイル... */
        #loginOverlay { display: none; position: fixed; inset: 0; background: linear-gradient(135deg, #6fceca 0%, #5eabd5 100%); flex-direction: column; justify-content: center; align-items: center; z-index: 20000; }
        .login-box { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .login-box input { width: 100%; padding: 12px 15px; margin-bottom: 18px; border: 1px solid #eef2f6; border-radius: 12px; background: #f8fafc; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; background: #6fceca; color: white; font-weight: bold; cursor: pointer; }

        #mainApp { display: none; width: 100%; height: 100%; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.2); border-radius: 0 30px 30px 0; margin-right: 20px; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eef2f6; flex-shrink: 0; }
        .search-bar { width: 450px; padding: 12px 25px; border-radius: 30px; border: 1px solid #e2e8f0; background-color: #f8fafc; outline: none; }
        .add-button { background:#6fceca; color:white; border:none; padding:12px 24px; border-radius:30px; font-weight:bold; cursor:pointer; }

        .card-grid { flex: 1; padding: 40px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .thumb-box { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; background: #e0f4f3; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-card { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #bbb; cursor: pointer; border: none; background: none; }
        .form-row { display: flex; gap: 20px; margin-bottom: 18px; }
        .form-group { flex: 1; }
        .form-group label { display: block; font-size: 12px; color: #6fceca; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border: 1px solid #eef2f6; border-radius: 12px; background: #f8fafc; font-size: 14px; outline: none; box-sizing: border-box; }
        
        /* エリア選択ボタンのスタイル */
        .area-type-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eef2f6; background: #fff; cursor: pointer; font-size: 13px; color: #888; transition: 0.2s; }
        .area-type-btn.active { background: #6fceca; color: white; border-color: #6fceca; font-weight: bold; }

        .save-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; background: #6fceca; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .display-value { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 15px; color: #333; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <input type="email" id="loginEmail" placeholder="メールアドレスを入力">
            <button class="login-btn" onclick="handleLogin()">ログイン</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="sidebar">
            <div class="logo-area"><img src="logo.png"></div>
            <a href="index.html" class="nav-item active"><span>キーワード</span></a>
            <a href="dept.html" class="nav-item"><span>部署</span></a>
            <a href="area.html" class="nav-item"><span>エリア</span></a>
        </div>

        <div class="main-content">
            <div class="header">
                <input type="text" class="search-bar" id="searchInput" placeholder="検索..." oninput="renderCards()">
                <button class="add-button" onclick="openAddModal()">＋ 新規追加</button>
            </div>
            <div id="cardGrid" class="card-grid"></div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeModal('detailModal')">×</button>
            <div id="viewAreaDisp" style="color: #6fceca; font-weight: bold; margin-bottom: 10px;"></div>
            <div class="form-row">
                <div class="form-group"><label>名前</label><div class="display-value" id="viewName"></div></div>
                <div class="form-group"><label>会社名</label><div class="display-value" id="viewCompany"></div></div>
            </div>
            <button class="save-btn" id="editTargetBtn" style="background: #eee; color: #666; margin-top: 30px;">編集する</button>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeModal('addModal')">×</button>
            <h2 id="modalTitle">名刺追加</h2>
            
            <div class="form-row">
                <div class="form-group"><label>名前</label><input type="text" id="newName"></div>
                <div class="form-group"><label>会社名</label><input type="text" id="newCompany"></div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>エリア</label>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button type="button" id="btnPrefIn" class="area-type-btn active" onclick="switchAreaType('in')">三重県内</button>
                    <button type="button" id="btnPrefOut" class="area-type-btn" onclick="switchAreaType('out')">県外</button>
                </div>
                
                <select id="selectCityIn">
                    <option value="">市町村を選択してください</option>
                    <optgroup label="北勢区">
                        <option value="いなべ市">いなべ市</option><option value="桑名市">桑名市</option><option value="四日市市">四日市市</option><option value="鈴鹿市">鈴鹿市</option><option value="亀山市">亀山市</option>
                    </optgroup>
                    <optgroup label="中勢区">
                        <option value="津市">津市</option><option value="松阪市">松阪市</option>
                    </optgroup>
                    <optgroup label="南勢区">
                        <option value="伊勢市">伊勢市</option><option value="鳥羽市">鳥羽市</option><option value="志摩市">志摩市</option>
                    </optgroup>
                    <optgroup label="伊賀区">
                        <option value="伊賀市">伊賀市</option><option value="名張市">名張市</option>
                    </optgroup>
                    <optgroup label="東紀州区">
                        <option value="尾鷲市">尾鷲市</option><option value="熊野市">熊野市</option>
                    </optgroup>
                </select>

                <select id="selectCityOut" style="display: none;">
                    <option value="">都道府県を選択してください</option>
                    <option value="愛知県">愛知県</option><option value="岐阜県">岐阜県</option><option value="滋賀県">滋賀県</option>
                    <option value="東京都">東京都</option><option value="大阪府">大阪府</option>
                    </select>
            </div>

            <button class="save-btn" onclick="saveCard()">保存する</button>
        </div>
    </div>

    <script>
        let cardData = JSON.parse(localStorage.getItem('businessCards')) || [];
        let currentAreaType = 'in'; // 'in' or 'out'

        function switchAreaType(type) {
            currentAreaType = type;
            const btnIn = document.getElementById('btnPrefIn');
            const btnOut = document.getElementById('btnPrefOut');
            const selIn = document.getElementById('selectCityIn');
            const selOut = document.getElementById('selectCityOut');

            if(type === 'in') {
                btnIn.classList.add('active'); btnOut.classList.remove('active');
                selIn.style.display = 'block'; selOut.style.display = 'none';
            } else {
                btnOut.classList.add('active'); btnIn.classList.remove('active');
                selOut.style.display = 'block'; selIn.style.display = 'none';
            }
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const term = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";
            cardData.filter(c => c.name.includes(term) || c.area.includes(term)).forEach(c => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => openDetailModal(c);
                div.innerHTML = `<div class="thumb-box"><img src="${c.icon}"></div><div><strong>${c.name}</strong><br><small>${c.company}</small><br><span style="color:#6fceca; font-size:12px;">${c.area}</span></div>`;
                grid.appendChild(div);
            });
        }

        function openAddModal() {
            editingCardId = null;
            document.getElementById('newName').value = "";
            document.getElementById('newCompany').value = "";
            switchAreaType('in');
            document.getElementById('addModal').style.display = 'flex';
        }

        function saveCard() {
            const name = document.getElementById('newName').value;
            const area = currentAreaType === 'in' ? document.getElementById('selectCityIn').value : document.getElementById('selectCityOut').value;
            
            if(!name || !area) { alert("入力が足りません"); return; }

            const newCard = {
                id: Date.now(),
                name: name,
                company: document.getElementById('newCompany').value,
                area: area,
                icon: 'user-1.png'
            };

            cardData.unshift(newCard);
            localStorage.setItem('businessCards', JSON.stringify(cardData));
            closeModal('addModal');
            renderCards();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function handleLogin() { sessionStorage.setItem('isLoggedIn', 'true'); location.reload(); }
        if(sessionStorage.getItem('isLoggedIn')) { 
            document.getElementById('loginOverlay').style.display = 'none'; 
            document.getElementById('mainApp').style.display = 'flex';
            renderCards();
        }
        document.documentElement.style.visibility = 'visible';
    </script>
</body>
</html>
