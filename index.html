<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; height: auto; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 40px 50px; display: flex; align-items: center; gap: 30px; }
        .search-container { position: relative; flex: 0 1 450px; }
        .search-bar { width: 100%; padding: 18px 15px 18px 65px; border-radius: 40px; border: 1px solid #e0e0e0; background-color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; }
        .add-button { background-color: #6fceca; color: white; border: none; padding: 14px 28px; border-radius: 35px; font-weight: bold; cursor: pointer; }

        .card-grid { padding: 0 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; border: 1px solid #f0f0f0; cursor: pointer; }
        .thumb-box { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0faff; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #e0f4f3; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 30px; padding: 40px; position: relative; }
        .info-group { margin-bottom: 15px; }
        .info-label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .info-value { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #eee; background: #f8f9fa; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png" class="nav-icon"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"><span>部署</span></a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"><span>エリア</span></a>
    </div>
    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" id="searchInput" placeholder="名前や部署で検索">
            </div>
            <button class="add-button" onclick="openAddModal()">新規追加</button>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()"><div id="modalInner"></div></div>
    </div>
    <script>
        let userData = JSON.parse(localStorage.getItem('myCards')) || [
            { id: 1, name: '清水 真輝', dept: '制作技術部', memo: '本人', icon: 'user-1.png' }
        ];
        function updateDisplay() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            userData.filter(u => u.name.toLowerCase().includes(search) || u.dept.toLowerCase().includes(search)).forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetail(user);
                card.innerHTML = `<div class="thumb-box"><img src="${user.icon}"></div><div style="font-weight:bold; font-size:20px;">${user.name}</div>`;
                grid.appendChild(card);
            });
        }
        function openDetail(u) {
            document.getElementById('modalInner').innerHTML = `
                <div style="text-align:center; margin-bottom:20px;"><div class="thumb-box" style="margin:0 auto; width:100px; height:100px;"><img src="${u.icon}"></div><h3>${u.name}</h3></div>
                <div class="info-group"><div class="info-label">部署</div><div class="info-value">${u.dept}</div></div>
                <div class="info-group"><div class="info-label">備考</div><div class="info-value">${u.memo}</div></div>
                <button onclick="deleteCard(${u.id})" style="width:100%; background:#ff7675; color:white; border:none; padding:10px; border-radius:10px; margin-top:10px;">削除</button>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }
        function openAddModal() {
            document.getElementById('modalInner').innerHTML = `
                <h3>新規登録</h3>
                <input type="text" id="new-name" placeholder="名前" class="info-value" style="margin-bottom:10px; background:white; border:1px solid #ddd;">
                <input type="text" id="new-dept" placeholder="部署" class="info-value" style="margin-bottom:10px; background:white; border:1px solid #ddd;">
                <textarea id="new-memo" placeholder="備考" class="info-value" style="margin-bottom:10px; background:white; border:1px solid #ddd; height:80px;"></textarea>
                <button onclick="saveCard()" style="width:100%; background:#6fceca; color:white; border:none; padding:10px; border-radius:10px;">保存</button>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }
        function saveCard() {
            const name = document.getElementById('new-name').value;
            if(!name) return;
            userData.push({ id: Date.now(), name, dept: document.getElementById('new-dept').value, memo: document.getElementById('new-memo').value, icon: 'user-1.png' });
            localStorage.setItem('myCards', JSON.stringify(userData));
            closeModal(); updateDisplay();
        }
        function deleteCard(id) {
            userData = userData.filter(u => u.id !== id);
            localStorage.setItem('myCards', JSON.stringify(userData));
            closeModal(); updateDisplay();
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        document.getElementById('searchInput').addEventListener('input', updateDisplay);
        window.onload = updateDisplay;
    </script>
</body>
</html>
