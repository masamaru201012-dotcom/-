<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - 部署別</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 8px; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eef2f6; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-title-icon { width: 32px; height: 32px; }
        .header-title { font-size: 20px; font-weight: bold; color: #444; }

        .content-container { flex: 1; display: flex; overflow: hidden; }
        .dept-selector { width: 320px; background: white; border-right: 1px solid #eef2f6; padding: 30px; overflow-y: auto; }
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .dept-folder { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 12px; transition: 0.2s; text-align: center; color: #555; }
        .dept-folder:hover { background: #f0faff; }
        /* 選択時に青文字にするスタイル */
        .dept-folder.selected { color: #5eabd5; }
        .folder-icon { width: 50px; height: 38px; background: #85c1e9; border-radius: 4px; position: relative; margin-bottom: 8px; }
        .folder-icon::before { content: ""; position: absolute; top: -5px; left: 0; width: 18px; height: 10px; background: inherit; border-radius: 3px; }

        .main-view { flex: 1; padding: 40px; overflow-y: auto; background: #f8fafc; }
        .view-title { font-size: 18px; font-weight: bold; color: #444; margin-bottom: 25px; border-bottom: 2px solid #6fceca; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item active"><img src="icon-dept.png"><span>部署</span></a>
        <a href="area.html" class="nav-item"><img src="icon-area.png"><span>エリア</span></a>
        <div class="user-profile-area"><div class="user-name">清水　茉咲 (制作技術部)</div></div>
    </div>
    <div class="main-content">
        <div class="header">
            <div class="header-left"><img src="icon-dept.png" class="header-title-icon"><div class="header-title">部署別</div></div>
            <button style="background:#6fceca; color:white; border:none; padding:12px 24px; border-radius:30px; font-weight:bold; cursor:pointer;">新規追加</button>
        </div>
        <div class="content-container">
            <div class="dept-selector"><div class="dept-grid" id="deptGrid"></div></div>
            <div class="main-view"><div id="viewTitle" class="view-title">部署を選択してください</div><div id="cardGrid"></div></div>
        </div>
    </div>
    <script>
        const depts = ["報道制作部", "制作技術部", "放送技術部", "本社営業部", "名古屋支社", "東京支社", "大阪支社", "放送部", "事業部", "編成部", "総務部"];
        const dGrid = document.getElementById('deptGrid');
        depts.forEach(d => {
            const folder = document.createElement('div'); folder.className = 'dept-folder';
            folder.innerHTML = `<div class="folder-icon"></div><div style="font-size:12px; font-weight:bold;">${d}</div>`;
            folder.onclick = function() {
                // 他の選択を解除して、クリックしたものを青文字に
                document.querySelectorAll('.dept-folder').forEach(el => el.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('viewTitle').innerText = d + "が登録した名刺";
            };
            dGrid.appendChild(folder);
        });
    </script>
</body>
</html>
