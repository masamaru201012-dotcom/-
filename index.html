<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード検索</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; z-index: 3000; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; transition: 0.3s; }
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; opacity: 0.8; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-item.active img { opacity: 1; }
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #ffffff; }
        .logout-btn { font-size: 12px; color: rgba(255, 255, 255, 0.6); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; outline: none; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eef2f6; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-title-icon { width: 32px; height: 32px; }
        .header-title { font-size: 20px; font-weight: bold; color: #444; }
        .search-container { position: relative; flex: 1; max-width: 400px; margin: 0 20px; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 20px; opacity: 0.3; }
        .search-bar { width: 100%; padding: 12px 25px 12px 50px; border-radius: 30px; border: 1px solid #e2e8f0; background-color: #f8fafc; font-size: 15px; outline: none; }
        .sort-container { display: flex; align-items: center; gap: 8px; }
        .sort-icon { width: 20px; height: 20px; }
        .sort-select { padding: 10px 15px; border-radius: 20px; border: 1px solid #e2e8f0; background: #fff; font-size: 13px; cursor: pointer; outline: none; }
        .add-button { background-color: #6fceca; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-left: 15px; }
        .card-grid { flex: 1; padding: 40px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; align-content: start; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .card:hover { transform: translateY(-5px); border-color: #6fceca; }
        .thumb-box { width: 80px; height: 80px; border-radius: 50%; background-color: #e0f4f3; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #fff; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-owner-tag { font-size: 11px; color: #5eabd5; background: #e0f4f3; padding: 4px 12px; border-radius: 15px; display: inline-block; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png"><span>部署</span></a>
        <a href="area.html" class="nav-item"><img src="icon-area.png"><span>エリア</span></a>
        <div class="user-profile-area">
            <div class="user-name" id="displayUserName">---</div>
            <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
        </div>
    </div>
    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <img src="icon-keyword.png" class="header-title-icon">
                <div class="header-title">キーワード検索</div>
            </div>
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" id="searchInput" placeholder="社外の名刺を検索..." oninput="searchCards()">
            </div>
            <div class="sort-container">
                <img src="btn-sort.png" class="sort-icon">
                <select id="sortOrder" class="sort-select" onchange="searchCards()">
                    <option value="new">登録が新しい順</option>
                    <option value="name">名前順</option>
                </select>
            </div>
            <button class="add-button" onclick="alert('準備中')">新規追加</button>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>
    <script>
        function handleLogout() { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; }
        function searchCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            let data = JSON.parse(localStorage.getItem('myCards')) || [];
            let filtered = data.filter(u => (u.name && u.name.toLowerCase().includes(query)) || (u.company && u.company.toLowerCase().includes(query)));
            filtered.forEach(user => {
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<div class="thumb-box"><img src="${user.icon ? user.icon : 'user-1.png'}"></div>
                <div><div style="font-weight:bold; font-size:18px;">${user.name}</div><div style="font-size:14px; color:#888;">${user.company || ''}</div><div class="card-owner-tag">👤 ${user.registeredBy}</div></div>`;
                grid.appendChild(card);
            });
        }
        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) document.getElementById('displayUserName').innerText = user.name + " (" + user.dept + ")";
            searchCards();
        };
    </script>
</body>
</html>
