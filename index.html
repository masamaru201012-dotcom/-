<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード</title>
    <style>
        /* レイアウト・デザイン共通（既存維持） */
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; height: auto; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 40px 50px; display: flex; align-items: center; gap: 30px; }
        .search-container { position: relative; flex: 0 1 450px; }
        .search-bar { width: 100%; padding: 18px 15px 18px 65px; border-radius: 40px; border: 1px solid #e0e0e0; background-color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; }

        .action-controls { margin-left: auto; display: flex; align-items: center; gap: 20px; }
        .add-button { background-color: #6fceca; color: white; border: none; padding: 14px 28px; border-radius: 35px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(111, 206, 202, 0.3); }
        .sort-trigger { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .sort-trigger img { height: 44px; }

        /* アイコン表示エリアの指定を強化 */
        .card-grid { padding: 0 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; border: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        
        .thumb-box { 
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0faff; 
            background-color: #e0f4f3; position: relative; flex-shrink: 0; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }
        /* 画像が枠いっぱいに表示されるように */
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .card-name { font-weight: bold; font-size: 20px; color: #333; }

        /* モーダル */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 30px; padding: 40px; position: relative; box-sizing: border-box; }
        .info-group { margin-bottom: 18px; }
        .info-label { font-size: 12px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
        .info-value, .info-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #eee; background: #f8f9fa; box-sizing: border-box; }
        .info-input { background: #fff; border: 1px solid #ddd; }
        .save-btn { width: 100%; background-color: #6fceca; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .delete-link { display: block; text-align: center; color: #ff7675; margin-top: 20px; font-size: 13px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png" class="nav-icon"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"><span>部署</span></a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"><span>エリア</span></a>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" id="searchInput" placeholder="名前や部署で検索">
            </div>
            <div class="action-controls">
                <button class="add-button" onclick="openAddModal()">新規追加</button>
                <div class="sort-trigger" onclick="toggleSort()">
                    <div id="sortLabel" style="font-weight:bold; color:#5eabd5;">最新順</div>
                    <img src="btn-sort.png">
                </div>
            </div>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()"><div id="modalInner"></div></div>
    </div>

    <script>
        // データの初期ロード
        let userData = JSON.parse(localStorage.getItem('myCards')) || [
            { id: 1, name: '清水 真輝', company: '三重テレビ放送', dept: '制作技術部', title: '係長', email: 'shimizu@mietv.example.com', phone: '059-123-4567', memo: '本人', icon: 'user-1.png', date: Date.now() }
        ];

        let currentSort = 'newest';

        function updateDisplay() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();

            let data = [...userData];
            if (currentSort === 'newest') data.sort((a,b) => b.date - a.date);
            else data.sort((a,b) => a.name.localeCompare(b.name, 'ja'));

            data.filter(u => u.name.toLowerCase().includes(search) || u.dept.toLowerCase().includes(search)).forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetail(user);
                
                // 画像表示エラー時のデバッグ機能付き
                card.innerHTML = `
                    <div class="thumb-box">
                        <img src="${user.icon}" alt="" 
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span style="display:none; font-size:30px; font-weight:bold; color:#5eabd5;">？</span>
                    </div>
                    <div class="card-name">${user.name}</div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleSort() {
            currentSort = (currentSort === 'newest') ? 'name' : 'newest';
            document.getElementById('sortLabel').innerText = (currentSort === 'newest') ? '最新順' : '名前順';
            updateDisplay();
        }

        function openDetail(u) {
            const inner = document.getElementById('modalInner');
            inner.innerHTML = `
                <div style="text-align:center; padding-bottom:20px; border-bottom:2px solid #f0faff; margin-bottom:25px;">
                    <div class="thumb-box" style="margin: 0 auto 15px; width:100px; height:100px;">
                        <img src="${u.icon}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span style="display:none; font-size:40px; font-weight:bold; color:#5eabd5;">？</span>
                    </div>
                    <div style="font-size:24px; font-weight:bold;">${u.name}</div>
                </div>
                <div class="info-group"><div class="info-label">会社名</div><div class="info-value">${u.company || '---'}</div></div>
                <div class="info-group"><div class="info-label">部署名</div><div class="info-value">${u.dept || '---'}</div></div>
                <div class="info-group"><div class="info-label">役職</div><div class="info-value">${u.title || '---'}</div></div>
                <div class="info-group"><div class="info-label">メールアドレス</div><div class="info-value">${u.email || '---'}</div></div>
                <div class="info-group"><div class="info-label">電話番号</div><div class="info-value">${u.phone || '---'}</div></div>
                <div class="info-group"><div class="info-label">備考</div><div class="info-value" style="white-space:pre-wrap;">${u.memo || '---'}</div></div>
                <div class="delete-link" onclick="deleteCard(${u.id})">この名刺を削除する</div>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function openAddModal() {
            const inner = document.getElementById('modalInner');
            inner.innerHTML = `
                <h2 style="color:#5eabd5; text-align:center;">新規名刺登録</h2>
                <div class="info-group"><div class="info-label">氏名</div><input type="text" id="add-name" class="info-input"></div>
                <div class="info-group"><div class="info-label">会社名</div><input type="text" id="add-company" class="info-input"></div>
                <div class="info-group"><div class="info-label">部署名</div><input type="text" id="add-dept" class="info-input"></div>
                <div class="info-group"><div class="info-label">役職</div><input type="text" id="add-title" class="info-input"></div>
                <div class="info-group"><div class="info-label">メールアドレス</div><input type="email" id="add-email" class="info-input"></div>
                <div class="info-group"><div class="info-label">電話番号</div><input type="tel" id="add-phone" class="info-input"></div>
                <div class="info-group"><div class="info-label">備考</div><textarea id="add-memo" class="info-input"></textarea></div>
                <button class="save-btn" onclick="saveNewCard()">保存する</button>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function saveNewCard() {
            const name = document.getElementById('add-name').value;
            if (!name) return alert('氏名は必須です');
            const nextId = userData.length > 0 ? Math.max(...userData.map(u => u.id)) + 1 : 1;
            const newCard = {
                id: nextId, name, company: document.getElementById('add-company').value,
                dept: document.getElementById('add-dept').value, title: document.getElementById('add-title').value,
                email: document.getElementById('add-email').value, phone: document.getElementById('add-phone').value,
                memo: document.getElementById('add-memo').value, 
                icon: `user-${(nextId % 6) + 1}.png`, 
                date: Date.now()
            };
            userData.push(newCard);
            localStorage.setItem('myCards', JSON.stringify(userData));
            closeModal(); updateDisplay();
        }

        function deleteCard(id) {
            if (!confirm('削除しますか？')) return;
            userData = userData.filter(u => u.id !== id);
            localStorage.setItem('myCards', JSON.stringify(userData));
            closeModal(); updateDisplay();
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        document.getElementById('searchInput').addEventListener('input', updateDisplay);
        window.onload = updateDisplay;
    </script>
</body>
</html>
