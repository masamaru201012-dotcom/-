<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - キーワード検索</title>
    <style>
        /* デザイン完全復元 */
        html { visibility: hidden; }
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }

        #loginOverlay { display: none; position: fixed; inset: 0; background: linear-gradient(135deg, #6fceca 0%, #5eabd5 100%); flex-direction: column; justify-content: center; align-items: center; z-index: 20000; }
        .login-box { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .login-box input { width: 100%; padding: 12px 15px; margin-bottom: 18px; border: 1px solid #eef2f6; border-radius: 12px; background: #f8fafc; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; background: #6fceca; color: white; font-weight: bold; cursor: pointer; }

        #mainApp { display: none; width: 100%; height: 100%; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.2); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eef2f6; flex-shrink: 0; }
        .search-container { position: relative; flex: 1; max-width: 450px; margin: 0 30px; }
        .search-bar { width: 100%; padding: 12px 25px 12px 50px; border-radius: 30px; border: 1px solid #e2e8f0; background-color: #f8fafc; outline: none; box-sizing: border-box; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .add-button { background:#6fceca; color:white; border:none; padding:12px 24px; border-radius:30px; font-weight:bold; cursor:pointer; white-space:nowrap; }
        .sort-select { padding: 10px 15px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; cursor: pointer; outline: none; }

        /* カードの横長デザイン復元 */
        .card-grid { flex: 1; padding: 40px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); grid-auto-rows: 130px; gap: 25px; align-items: start; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; cursor: pointer; height: 130px; box-sizing: border-box; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #6fceca; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .thumb-box { width: 80px; height: 80px; min-width: 80px; border-radius: 50%; overflow: hidden; background: #e0f4f3; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-card { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #bbb; cursor: pointer; border: none; background: none; }
        .form-row { display: flex; gap: 20px; margin-bottom: 18px; }
        .form-group { flex: 1; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: #6fceca; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border: 1px solid #eef2f6; border-radius: 12px; background: #f8fafc; font-size: 14px; outline: none; box-sizing: border-box; }
        
        /* エリア切替ボタン */
        .area-type-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eef2f6; background: #fff; cursor: pointer; font-size: 13px; color: #888; }
        .area-type-btn.active { background: #6fceca; color: white; border-color: #6fceca; font-weight: bold; }

        .save-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; background: #6fceca; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .display-value { width: 100%; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 15px; color: #333; min-height: 35px; display: flex; align-items: center; }
        .action-btn-container { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 40px; }
        .edit-btn, .delete-btn { background: none; border: none; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: underline; }
        .edit-btn { color: #6fceca; } .delete-btn { color: #ff5a5f; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <input type="email" id="loginEmail" placeholder="メールアドレスを入力">
            <button class="login-btn" onclick="handleLogin()">ログイン</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="sidebar">
            <div class="logo-area"><img src="logo.png"></div>
            <a href="index.html" class="nav-item active"><span>キーワード</span></a>
            <a href="dept.html" class="nav-item"><span>部署</span></a>
            <a href="area.html" class="nav-item"><span>エリア</span></a>
            <div class="user-profile-area"><div class="user-name">清水　茉咲</div></div>
        </div>

        <div class="main-content">
            <div class="header">
                <div class="search-container">
                    <input type="text" class="search-bar" id="searchInput" placeholder="名前・エリア等で検索..." oninput="renderCards()">
                </div>
                <div class="header-actions">
                    <button class="add-button" onclick="openAddModal()">＋ 新規追加</button>
                    <select class="sort-select" id="sortSelect" onchange="renderCards()">
                        <option value="new">最新順</option>
                        <option value="asc">五十音順</option>
                    </select>
                </div>
            </div>
            <div id="cardGrid" class="card-grid"></div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeModal('detailModal')">×</button>
            <div class="img-container" style="text-align:center; margin-bottom:20px;">
                <img id="viewImg" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
            </div>
            <div class="form-row">
                <div class="form-group"><label>名前</label><div class="display-value" id="viewName"></div></div>
                <div class="form-group"><label>エリア</label><div class="display-value" id="viewArea"></div></div>
            </div>
            <div class="form-group"><label>会社名</label><div class="display-value" id="viewCompany"></div></div>
            <div class="action-btn-container">
                <button class="edit-btn" id="editTargetBtn">編集</button>
                <button class="delete-btn" id="deleteTargetBtn">削除</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeModal('addModal')">×</button>
            <h2 id="modalTitle" style="text-align:center; margin-bottom:25px;">新規名刺追加</h2>
            
            <div class="form-row">
                <div class="form-group"><label>名前</label><input type="text" id="newName"></div>
                <div class="form-group"><label>会社名</label><input type="text" id="newCompany"></div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>エリア</label>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button type="button" id="btnPrefIn" class="area-type-btn active" onclick="switchAreaType('in')">三重県内</button>
                    <button type="button" id="btnPrefOut" class="area-type-btn" onclick="switchAreaType('out')">県外</button>
                </div>
                
                <select id="selectCityIn">
                    <option value="">市町村を選択してください</option>
                    <optgroup label="北勢">
                        <option value="いなべ市">いなべ市</option><option value="桑名市">桑名市</option><option value="四日市市">四日市市</option><option value="鈴鹿市">鈴鹿市</option><option value="亀山市">亀山市</option><option value="木曽岬町">木曽岬町</option><option value="東員町">東員町</option><option value="菰野町">菰野町</option><option value="朝日町">朝日町</option><option value="川越町">川越町</option>
                    </optgroup>
                    <optgroup label="中勢">
                        <option value="津市">津市</option><option value="松阪市">松阪市</option><option value="多気町">多気町</option><option value="明和町">明和町</option><option value="大台町">大台町</option>
                    </optgroup>
                    <optgroup label="南勢">
                        <option value="伊勢市">伊勢市</option><option value="鳥羽市">鳥羽市</option><option value="志摩市">志摩市</option><option value="玉城町">玉城町</option><option value="度会町">度会町</option><option value="南伊勢町">南伊勢町</option><option value="大紀町">大紀町</option>
                    </optgroup>
                    <optgroup label="伊賀">
                        <option value="伊賀市">伊賀市</option><option value="名張市">名張市</option>
                    </optgroup>
                    <optgroup label="東紀州">
                        <option value="尾鷲市">尾鷲市</option><option value="熊野市">熊野市</option><option value="紀北町">紀北町</option><option value="御浜町">御浜町</option><option value="紀宝町">紀宝町</option>
                    </optgroup>
                </select>

                <select id="selectCityOut" style="display: none;">
                    <option value="">都道府県を選択してください</option>
                    <option value="愛知県">愛知県</option><option value="岐阜県">岐阜県</option><option value="滋賀県">滋賀県</option><option value="東京都">東京都</option><option value="大阪府">大阪府</option><option value="京都府">京都府</option><option value="兵庫県">兵庫県</option><option value="奈良県">奈良県</option><option value="和歌山県">和歌山県</option><option value="静岡県">静岡県</option>
                </select>
            </div>

            <button class="save-btn" onclick="saveCard()">保存する</button>
        </div>
    </div>

    <script>
        let cardData = JSON.parse(localStorage.getItem('businessCards')) || [];
        let currentAreaType = 'in';
        let editingCardId = null;

        function switchAreaType(type) {
            currentAreaType = type;
            const btnIn = document.getElementById('btnPrefIn');
            const btnOut = document.getElementById('btnPrefOut');
            const selIn = document.getElementById('selectCityIn');
            const selOut = document.getElementById('selectCityOut');
            if(type === 'in') {
                btnIn.classList.add('active'); btnOut.classList.remove('active');
                selIn.style.display = 'block'; selOut.style.display = 'none';
            } else {
                btnOut.classList.add('active'); btnIn.classList.remove('active');
                selOut.style.display = 'block'; selIn.style.display = 'none';
            }
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const term = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            grid.innerHTML = "";
            let filtered = cardData.filter(c => c.name.toLowerCase().includes(term) || c.area.includes(term));
            if(sortBy === "asc") filtered.sort((a,b) => a.name.localeCompare(b.name, 'ja'));
            else filtered.sort((a,b) => b.id - a.id);

            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => openDetailModal(c);
                div.innerHTML = `<div class="thumb-box"><img src="${c.icon}"></div><div><div style="font-weight:bold; font-size:18px;">${c.name}</div><div style="font-size:13px; color:#888;">${c.company} | ${c.area}</div></div>`;
                grid.appendChild(div);
            });
        }

        function openAddModal() {
            editingCardId = null;
            document.getElementById('modalTitle').innerText = "新規名刺追加";
            document.getElementById('newName').value = "";
            document.getElementById('newCompany').value = "";
            switchAreaType('in');
            document.getElementById('addModal').style.display = 'flex';
        }

        function openDetailModal(data) {
            document.getElementById('viewImg').src = data.icon;
            document.getElementById('viewName').innerText = data.name;
            document.getElementById('viewCompany').innerText = data.company;
            document.getElementById('viewArea').innerText = data.area;
            document.getElementById('deleteTargetBtn').onclick = () => {
                if(confirm("削除しますか？")){
                    cardData = cardData.filter(c => c.id !== data.id);
                    localStorage.setItem('businessCards', JSON.stringify(cardData));
                    closeModal('detailModal'); renderCards();
                }
            };
            document.getElementById('detailModal').style.display = 'flex';
        }

        function saveCard() {
            const name = document.getElementById('newName').value;
            const area = currentAreaType === 'in' ? document.getElementById('selectCityIn').value : document.getElementById('selectCityOut').value;
            if(!name || !area) { alert("名前とエリアを入力してください"); return; }
            
            const cardInfo = {
                id: editingCardId || Date.now(),
                name: name,
                company: document.getElementById('newCompany').value,
                area: area,
                icon: 'user-1.png'
            };

            if(editingCardId) {
                const idx = cardData.findIndex(c => c.id === editingCardId);
                cardData[idx] = cardInfo;
            } else { cardData.unshift(cardInfo); }

            localStorage.setItem('businessCards', JSON.stringify(cardData));
            closeModal('addModal'); renderCards();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function handleLogin() { sessionStorage.setItem('isLoggedIn', 'true'); location.reload(); }
        if(sessionStorage.getItem('isLoggedIn')) { 
            document.getElementById('loginOverlay').style.display = 'none'; 
            document.getElementById('mainApp').style.display = 'flex';
            renderCards();
        }
        document.documentElement.style.visibility = 'visible';
    </script>
</body>
</html>
