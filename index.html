<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - キーワード検索</title>
    <style>
        html { visibility: hidden; }
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }

        /* サイドバー：元のサイズと余白を復元 */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 40px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 60px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 18px 30px; color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 17px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.2); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; object-fit: contain; flex-shrink: 0; }
        
        /* 左下アカウントエリア：ガタつき防止のため高さを固定しつつ元のシンプルさに */
        .user-profile-area { margin-top: auto; height: 120px; padding: 0 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        .user-name { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .logout-link { font-size: 12px; color: rgba(255, 255, 255, 0.6); text-decoration: none; cursor: pointer; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ヘッダー：アイコンが潰れない最小幅を確保 */
        .header { height: 80px; background: white; padding: 0 40px; display: flex; align-items: center; border-bottom: 1px solid #eef2f6; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; width: 260px; flex-shrink: 0; }
        .header-icon { width: 28px; height: 28px; margin-right: 15px; object-fit: contain; flex-shrink: 0; }

        .search-container { position: relative; flex: 1; max-width: 400px; margin: 0 30px; }
        .search-bar { width: 100%; padding: 12px 20px 12px 45px; border-radius: 30px; border: 1px solid #e2e8f0; background-color: #f8fafc; font-size: 15px; outline: none; box-sizing: border-box; }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .add-button { background:#6fceca; color:white; border:none; padding:12px 24px; border-radius:30px; font-weight:bold; cursor:pointer; }
        .sort-select { padding: 10px 15px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; font-size: 14px; color: #666; }

        /* カード・モーダルのスタイル（元のシンプルさを維持） */
        .card-grid { flex: 1; padding: 40px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); grid-auto-rows: 130px; gap: 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; cursor: pointer; height: 130px; box-sizing: border-box; }
        .thumb-box { width: 80px; height: 80px; min-width: 80px; border-radius: 50%; overflow: hidden; background: #e0f4f3; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 10000; justify-content: center; align-items: center; }
        .modal-card { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #bbb; cursor: pointer; border: none; background: none; }
        
        .form-row { display: flex; gap: 20px; margin-bottom: 18px; }
        .form-group { flex: 1; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: #6fceca; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border: 1px solid #eef2f6; border-radius: 12px; background: #f8fafc; font-size: 14px; outline: none; box-sizing: border-box; }
        
        .preview-box { width: 100px; height: 100px; border: 2px dashed #eef2f6; border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .display-value { width: 100%; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 15px; color: #333; min-height: 35px; display: flex; align-items: center; }
        .delete-btn { background: none; border: none; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: underline; color: #ff5a5f; width: 100%; margin-top: 20px; }
        
        .area-type-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eef2f6; background: #fff; cursor: pointer; font-size: 13px; color: #888; }
        .area-type-btn.active { background: #6fceca; color: white; border-color: #6fceca; font-weight: bold; }
    </style>
</head>
<body>

    <div id="mainApp" style="display: flex;">
        <div class="sidebar">
            <div class="logo-area"><img src="logo.png"></div>
            <a href="index.html" class="nav-item active"><img src="icon-keyword.png"><span>キーワード</span></a>
            <a href="dept.html" class="nav-item"><img src="icon-dept.png"><span>部署</span></a>
            <a href="area.html" class="nav-item"><img src="icon-area.png"><span>エリア</span></a>
            <div class="user-profile-area">
                <div class="user-name">清水　茉咲 (制作技術部)</div>
                <div class="logout-link" onclick="handleLogout()">ログアウト</div>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <div class="header-left">
                    <img src="icon-keyword.png" class="header-icon">
                    <h2 style="margin:0; font-size:18px; color:#444;">キーワード検索</h2>
                </div>
                <div class="search-container">
                    <input type="text" class="search-bar" id="searchInput" placeholder="検索" oninput="renderCards()">
                </div>
                <div class="header-actions">
                    <button class="add-button" onclick="openAddModal()">＋ 新規追加</button>
                    <select class="sort-select" id="sortSelect" onchange="renderCards()">
                        <option value="new">最新順</option>
                        <option value="asc">五十音順</option>
                    </select>
                </div>
            </div>
            <div id="cardGrid" class="card-grid"></div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeModal('addModal')">×</button>
            <h2 style="text-align:center; margin-bottom:25px;">新規名刺追加</h2>
            <div class="preview-box" onclick="document.getElementById('imageInput').click()"><img id="previewImg" style="display: none;"><span id="uploadPlaceholder" style="color:#aaa; font-size:12px;">画像を選択</span></div>
            <input type="file" id="imageInput" style="display:none;" accept="image/*" onchange="previewImage(this)">
            
            <div class="form-row">
                <div class="form-group"><label>名前 *</label><input type="text" id="newName"></div>
                <div class="form-group"><label>ふりがな</label><input type="text" id="newKana"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>会社名 *</label><input type="text" id="newCompany"></div>
                <div class="form-group"><label>部署名</label><input type="text" id="newDept"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>役職</label><input type="text" id="newTitle"></div>
                <div class="form-group">
                    <label>エリア</label>
                    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                        <button type="button" id="btnPrefIn" class="area-type-btn active" onclick="switchAreaType('in')">三重県内</button>
                        <button type="button" id="btnPrefOut" class="area-type-btn" onclick="switchAreaType('out')">県外</button>
                    </div>
                    <select id="selectCityIn">
                        <option value="">選択してください</option>
                        <optgroup label="北勢"><option value="いなべ市">いなべ市</option><option value="桑名市">桑名市</option><option value="四日市市">四日市市</option><option value="鈴鹿市">鈴鹿市</option><option value="亀山市">亀山市</option><option value="木曽岬町">木曽岬町</option><option value="東員町">東員町</option><option value="菰野町">菰野町</option><option value="朝日町">朝日町</option><option value="川越町">川越町</option></optgroup>
                        <optgroup label="中南勢"><option value="津市">津市</option><option value="松阪市">松阪市</option><option value="多気町">多気町</option><option value="明和町">明和町</option><option value="大台町">大台町</option></optgroup>
                        <optgroup label="伊勢志摩"><option value="伊勢市">伊勢市</option><option value="鳥羽市">鳥羽市</option><option value="志摩市">志摩市</option><option value="玉城町">玉城町</option><option value="度会町">度会町</option><option value="大紀町">大紀町</option><option value="南伊勢町">南伊勢町</option></optgroup>
                        <optgroup label="伊賀"><option value="伊賀市">伊賀市</option><option value="名張市">名張市</option></optgroup>
                        <optgroup label="東紀州"><option value="尾鷲市">尾鷲市</option><option value="熊野市">熊野市</option><option value="紀北町">紀北町</option><option value="御浜町">御浜町</option><option value="紀宝町">紀宝町</option></optgroup>
                    </select>
                    <select id="selectCityOut" style="display: none;">
                        <option value="">都道府県を選択</option>
                        <option value="愛知県">愛知県</option><option value="岐阜県">岐阜県</option><option value="滋賀県">滋賀県</option><option value="奈良県">奈良県</option><option value="和歌山県">和歌山県</option><option value="東京都">東京都</option><option value="大阪府">大阪府</option><option value="その他">その他</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>備考</label><textarea id="newNote" rows="3"></textarea></div>
            <button class="add-button" style="width: 100%; padding: 16px; margin-top: 10px;" onclick="saveCard()">保存する</button>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeModal('detailModal')">×</button>
            <div style="text-align:center; margin-bottom:20px;"><img id="viewImg" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #eef2f6;"></div>
            <div class="form-row"><div class="form-group"><label>名前</label><div class="display-value" id="viewName"></div></div><div class="form-group"><label>ふりがな</label><div class="display-value" id="viewKana"></div></div></div>
            <div class="form-row"><div class="form-group"><label>会社名</label><div class="display-value" id="viewCompany"></div></div><div class="form-group"><label>部署名</label><div class="display-value" id="viewDept"></div></div></div>
            <div class="form-row"><div class="form-group"><label>役職</label><div class="display-value" id="viewTitle"></div></div><div class="form-group"><label>エリア</label><div class="display-value" id="viewArea"></div></div></div>
            <div class="form-group"><label>備考</label><div class="display-value" style="min-height:80px; align-items:start;" id="viewNote"></div></div>
            <button class="delete-btn" id="deleteTargetBtn">名刺を削除</button>
        </div>
    </div>

    <script>
        let cardData = JSON.parse(localStorage.getItem('businessCards')) || [];
        let currentImageDataUrl = "";

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const term = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";
            let filtered = cardData.filter(c => (c.name || "").toLowerCase().includes(term) || (c.company || "").toLowerCase().includes(term));
            filtered.forEach(c => {
                const div = document.createElement('div'); div.className = 'card'; div.onclick = () => openDetailModal(c);
                div.innerHTML = `<div class="thumb-box"><img src="${c.icon || 'user-1.png'}"></div><div><div style="font-weight:bold; font-size:18px;">${c.name}</div><div style="font-size:13px; color:#888;">${c.company}</div></div>`;
                grid.appendChild(div);
            });
        }
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    currentImageDataUrl = e.target.result;
                    document.getElementById('previewImg').src = currentImageDataUrl;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function saveCard() {
            const name = document.getElementById('newName').value;
            const company = document.getElementById('newCompany').value;
            if(!name || !company) return alert("必須項目を入力してください");
            const area = document.getElementById('selectCityIn').style.display !== 'none' ? document.getElementById('selectCityIn').value : document.getElementById('selectCityOut').value;
            cardData.unshift({ id: Date.now(), name, company, kana: document.getElementById('newKana').value, dept: document.getElementById('newDept').value, title: document.getElementById('newTitle').value, area: area || "-", note: document.getElementById('newNote').value, icon: currentImageDataUrl || 'user-1.png' });
            localStorage.setItem('businessCards', JSON.stringify(cardData)); closeModal('addModal'); renderCards();
        }
        function openAddModal() { ['newName','newKana','newCompany','newDept','newTitle','newNote'].forEach(id => document.getElementById(id).value = ""); document.getElementById('previewImg').style.display = 'none'; document.getElementById('uploadPlaceholder').style.display = 'block'; currentImageDataUrl = ""; switchAreaType('in'); document.getElementById('addModal').style.display = 'flex'; }
        function openDetailModal(data) { document.getElementById('viewImg').src = data.icon || 'user-1.png'; document.getElementById('viewName').innerText = data.name; document.getElementById('viewKana').innerText = data.kana || "-"; document.getElementById('viewCompany').innerText = data.company; document.getElementById('viewDept').innerText = data.dept || "-"; document.getElementById('viewTitle').innerText = data.title || "-"; document.getElementById('viewArea').innerText = data.area || "-"; document.getElementById('viewNote').innerText = data.note || "-"; document.getElementById('deleteTargetBtn').onclick = () => { if(confirm("削除しますか？")){ cardData = cardData.filter(c => c.id !== data.id); localStorage.setItem('businessCards', JSON.stringify(cardData)); closeModal('detailModal'); renderCards(); } }; document.getElementById('detailModal').style.display = 'flex'; }
        function switchAreaType(type) { document.getElementById('btnPrefIn').classList.toggle('active', type === 'in'); document.getElementById('btnPrefOut').classList.toggle('active', type === 'out'); document.getElementById('selectCityIn').style.display = type === 'in' ? 'block' : 'none'; document.getElementById('selectCityOut').style.display = type === 'out' ? 'block' : 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function handleLogout() { if(confirm("ログアウトしますか？")) location.href = "login.html"; }
        renderCards();
        document.documentElement.style.visibility = 'visible';
    </script>
</body>
</html>
