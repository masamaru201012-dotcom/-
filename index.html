<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; z-index: 3000; transition: 0.3s; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 25px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        
        /* ログインユーザー表示エリア (全ページ共通) */
        .user-profile-area { margin-top: auto; padding: 25px; border-top: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.05); }
        .user-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .logout-btn { font-size: 11px; color: rgba(255,255,255,0.7); cursor: pointer; border: none; background: none; text-decoration: underline; padding: 0; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 30px 40px; display: flex; align-items: center; border-bottom: 1px solid #eef2f6; }
        .search-container { position: relative; flex: 1; max-width: 600px; }
        .search-bar { width: 100%; padding: 15px 50px; border-radius: 30px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 16px; outline: none; }
        .add-button { margin-left:20px; background:#6fceca; color:white; border:none; padding:12px 25px; border-radius:25px; font-weight:bold; cursor:pointer; }

        .card-grid { flex: 1; padding: 40px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; align-content: start; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); border-color: #6fceca; }
        .thumb-box { width: 75px; height: 75px; border-radius: 50%; background: #e0f4f3; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; color: #5eabd5; overflow: hidden; position: relative; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .owner-tag { font-size: 11px; color: #5eabd5; background: #e0f4f3; padding: 3px 10px; border-radius: 12px; display: inline-block; margin-top: 8px; }

        /* ログイン画面 */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #6fceca 0%, #5eabd5 100%); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 50px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }

        /* 拡大モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; }
        .modal-img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="color: #5eabd5; margin-top:0;">名刺くらうど ログイン</h2>
            <input type="email" id="userEmail" class="login-input" placeholder="メールアドレスを入力">
            <button onclick="handleLogin()" style="width: 100%; padding: 12px; background: #6fceca; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">ログイン</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item active"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><span>部署</span></a>
        <a href="area.html" class="nav-item"><span>エリア</span></a>
        
        <div class="user-profile-area">
            <div class="user-name" id="displayUserName">---</div>
            <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <input type="text" class="search-bar" id="searchInput" placeholder="名前、会社、登録者名で検索..." oninput="searchCards()">
            </div>
            <button class="add-button" onclick="alert('新規追加は開発中')">新規追加</button>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <img id="modalImg" class="modal-img">
    </div>

    <script>
        const staffList = {
            "m-shimizu@mietv.co.jp": { name: "清水 真輝", dept: "制作技術部" },
            "nakatani@mietv.co.jp": { name: "中谷", dept: "報道制作部" }
        };

        function checkLogin() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                document.getElementById('loginOverlay').style.display = 'flex';
            } else {
                document.getElementById('displayUserName').innerText = user.name + " (" + user.dept + ")";
            }
        }

        function handleLogin() {
            const email = document.getElementById('userEmail').value.trim();
            if (staffList[email]) {
                localStorage.setItem('currentUser', JSON.stringify(staffList[email]));
                location.reload();
            } else { alert("アドレスが登録されていません。"); }
        }

        function handleLogout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }

        function openModal(img) {
            if(!img) return;
            document.getElementById('imageModal').style.display = 'flex';
            document.getElementById('modalImg').src = img;
        }

        function searchCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            
            data.filter(u => 
                (u.name && u.name.toLowerCase().includes(query)) ||
                (u.company && u.company.toLowerCase().includes(query)) ||
                (u.registeredBy && u.registeredBy.toLowerCase().includes(query))
            ).forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(user.icon);
                card.innerHTML = `
                    <div class="thumb-box">
                        ${user.name.charAt(0)}
                        ${user.icon ? `<img src="${user.icon}">` : ''}
                    </div>
                    <div>
                        <div style="font-weight:bold; font-size:18px;">${user.name}</div>
                        <div style="font-size:13px; color:#888;">${user.company || ''} / ${user.dept || ''}</div>
                        <div class="owner-tag">👤 登録者: ${user.registeredBy}</div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        window.onload = () => { checkLogin(); searchCards(); };
    </script>
</body>
</html>
