<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - キーワード検索</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        
        /* サイドバー・ヘッダー（維持） */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; transition: none; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 8px; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eef2f6; flex-shrink: 0; }
        .header-title { font-size: 20px; font-weight: bold; color: #444; }
        .search-container { position: relative; flex: 1; max-width: 450px; margin: 0 20px; }
        .search-bar { width: 100%; padding: 12px 25px 12px 50px; border-radius: 30px; border: 1px solid #e2e8f0; background-color: #f8fafc; font-size: 15px; outline: none; box-sizing: border-box; }

        .header-actions { display: flex; gap: 10px; align-items: center; }
        .add-button { background:#6fceca; color:white; border:none; padding:12px 24px; border-radius:30px; font-weight:bold; cursor:pointer; white-space:nowrap; }
        .sort-select { padding: 12px 15px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; font-size: 14px; color: #666; cursor: pointer; outline: none; }

        /* 【修正】名刺カード：縦伸び徹底防止 */
        .card-grid { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            grid-auto-rows: 130px; /* カードの高さを一律固定 */
            gap: 25px; 
            align-items: start; /* 上揃えにして縦に伸ばさない */
        }
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 25px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            border: 1px solid #eef2f6; 
            cursor: pointer; 
            height: 130px; /* カード自体の高さを固定 */
            box-sizing: border-box;
            overflow: hidden;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: #6fceca; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 画像を絶対に変形させない設定 */
        .thumb-box { 
            width: 80px; 
            height: 80px; 
            min-width: 80px; /* 縮小防止 */
            min-height: 80px; /* 縮小防止 */
            border-radius: 50%; 
            overflow: hidden; 
            background: #e0f4f3; 
            border: 2px solid #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .thumb-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        /* モーダル関連（維持） */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
        .add-modal-card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; position: relative; }
        .add-modal-header { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 20px; text-align: center; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; border: none; background: none; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; font-size: 14px; box-sizing: border-box; outline: none; }
        .form-group textarea { height: 80px; resize: none; }
        .image-preview-area { width: 100px; height: 100px; border-radius: 15px; border: 2px dashed #e2e8f0; background: #f8fafc; margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: pointer; position: relative; }
        .image-preview-area img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .image-preview-area.has-image img { display: block; }
        .image-label { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; }
        .save-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #6fceca; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #imageModal img { max-width: 95%; max-height: 95%; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png"><span>部署</span></a>
        <a href="area.html" class="nav-item"><img src="icon-area.png"><span>エリア</span></a>
        <div class="user-profile-area">
            <div class="user-name">清水　茉咲 (制作技術部)</div>
            <a href="#" onclick="doLogout()" style="color:rgba(255,255,255,0.6); font-size:12px; text-decoration:none;">ログアウト</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left"><div class="header-title">キーワード検索</div></div>
            <div class="search-container"><input type="text" class="search-bar" id="searchInput" placeholder="検索" oninput="renderCards()"></div>
            <div class="header-actions">
                <button class="add-button" onclick="openAddModal()">新規追加</button>
                <select class="sort-select" id="sortSelect" onchange="renderCards()">
                    <option value="new">最新順</option>
                    <option value="asc">五十音順</option>
                    <option value="desc">五十音順（逆）</option>
                </select>
            </div>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>

    <div id="addModal" class="modal">
        <div class="add-modal-card">
            <button class="close-modal" onclick="closeAddModal()">×</button>
            <div class="add-modal-header">新規名刺追加</div>
            <div class="image-preview-area" id="imagePreviewArea" onclick="document.getElementById('imageInput').click()">
                <img id="previewImg" src="">
            </div>
            <div class="image-label">名刺をクリックして画像を選択</div>
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
            <div class="form-row">
                <div class="form-group"><label>名前</label><input type="text" id="newName"></div>
                <div class="form-group"><label>ふりがな</label><input type="text" id="newKana"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>会社名</label><input type="text" id="newCompany"></div>
                <div class="form-group"><label>部署名</label><input type="text" id="newDept"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>役職</label><input type="text" id="newTitle"></div>
                <div class="form-group"><label>メールアドレス</label><input type="text" id="newEmail"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>電話番号</label><input type="text" id="newTel"></div>
            </div>
            <div class="form-group"><label>備考</label><textarea id="newNote"></textarea></div>
            <button class="save-btn" onclick="saveNewCard()">保存する</button>
        </div>
    </div>

    <script>
        let cardData = [
            { id: 3, name: "浅井 拓也", company: "津シティ広告", icon: "user-3.png" },
            { id: 2, name: "田中 美咲", company: "東海放送システム", icon: "user-2.png" },
            { id: 1, name: "佐藤 健二", company: "株式会社三重デジタル", icon: "user-1.png" }
        ];

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const term = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            grid.innerHTML = "";
            let filtered = cardData.filter(c => c.name.toLowerCase().includes(term) || c.company.toLowerCase().includes(term));
            filtered.sort((a, b) => {
                if (sortBy === "new") return b.id - a.id;
                if (sortBy === "asc") return a.name.localeCompare(b.name, 'ja');
                if (sortBy === "desc") return b.name.localeCompare(a.name, 'ja');
                return 0;
            });
            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => {
                    document.getElementById('modalImg').src = c.icon;
                    document.getElementById('imageModal').style.display = 'flex';
                };
                div.innerHTML = `<div class="thumb-box"><img src="${c.icon}"></div><div><div style="font-weight:bold; font-size:18px; color:#333;">${c.name}</div><div style="font-size:13px; color:#888; margin-top:4px; line-height:1.2;">${c.company}</div></div>`;
                grid.appendChild(div);
            });
        }

        let currentImageDataUrl = "";
        function openAddModal() {
            ['newName','newKana','newCompany','newDept','newTitle','newEmail','newTel','newNote'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('imageInput').value = "";
            document.getElementById('imagePreviewArea').classList.remove('has-image');
            document.getElementById('addModal').style.display = 'flex';
        }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    currentImageDataUrl = e.target.result;
                    document.getElementById('previewImg').src = currentImageDataUrl;
                    document.getElementById('imagePreviewArea').classList.add('has-image');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function saveNewCard() {
            const name = document.getElementById('newName').value;
            if (!name || !currentImageDataUrl) { alert("名前と画像は必須です"); return; }
            const newId = cardData.length > 0 ? Math.max(...cardData.map(c => c.id)) + 1 : 1;
            cardData.unshift({
                id: newId,
                name: name,
                company: document.getElementById('newCompany').value,
                icon: currentImageDataUrl
            });
            closeAddModal();
            renderCards();
        }
        function doLogout() { sessionStorage.removeItem('isLoggedIn'); location.reload(); }
        window.onload = () => { renderCards(); };
    </script>
</body>
</html>
