<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .sidebar-grad { background: linear-gradient(180deg, #53bdc2 0%, #76b4e9 100%); }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-radius: 15px; }
        .folder-shape { clip-path: polygon(0% 15%, 35% 15%, 45% 0%, 100% 0%, 100% 100%, 0% 100%); }
        .active-tab { background: white; color: #53bdc2; border-radius: 20px 0 0 20px; box-shadow: -4px 0 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 sidebar-grad flex flex-col p-6 text-white shrink-0">
        <div class="mb-2 text-2xl font-bold tracking-wider">名刺くらうど</div>
        
        <button onclick="alert('名刺追加フォームを開きます')" class="mt-4 mb-10 bg-[#f7db66] text-black py-3 px-6 rounded-2xl font-bold shadow-md hover:scale-105 transition-transform">
            ＋ 追加
        </button>

        <nav class="space-y-4 flex-1">
            <div onclick="showPage('keyword')" id="btn-keyword" class="flex items-center p-3 cursor-pointer active-tab">
                <span class="mr-3 text-xl">🔍</span> キーワード
            </div>
            <div onclick="showPage('dept')" id="btn-dept" class="flex items-center p-3 cursor-pointer">
                <span class="mr-3 text-xl">📁</span> 部署
            </div>
            <div onclick="showPage('area')" id="btn-area" class="flex items-center p-3 cursor-pointer">
                <span class="mr-3 text-xl">📍</span> エリア
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-[#f0f4f8] overflow-y-auto p-8">
        
        <section id="page-keyword">
            <div class="mb-8 flex items-center bg-white rounded-full px-6 py-3 shadow-sm max-w-2xl">
                <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="キーワードで検索" class="flex-1 outline-none text-gray-600">
                <span class="text-gray-400">🔍</span>
            </div>
            <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="page-dept" class="hidden grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="flex flex-col items-center">
                <div class="w-24 h-20 bg-gray-200 folder-shape flex items-center justify-center space-x-1">
                    <div class="w-4 h-4 rounded-full bg-orange-400"></div>
                    <div class="w-4 h-4 rounded-full bg-green-400"></div>
                </div>
                <p class="mt-2 font-bold text-gray-600">営業部</p>
            </div>
            </section>

        <section id="page-area" class="hidden">
            <h2 class="text-xl font-bold text-gray-600 mb-4 border-l-4 border-[#53bdc2] pl-3">中部地方</h2>
            <div class="flex flex-wrap gap-3">
                <button class="bg-white px-6 py-2 rounded-full shadow-sm hover:bg-[#53bdc2] hover:text-white transition">三重</button>
                <button class="bg-white px-6 py-2 rounded-full shadow-sm">岐阜</button>
                <button class="bg-white px-6 py-2 rounded-full shadow-sm">愛知</button>
            </div>
        </section>

    </main>

    <script>
        // ダミーデータ
        const cards = [
            { name: "中谷 常義", company: "三重テレビ放送", color: "bg-orange-400" },
            { name: "清水 茉咲", company: "三重テレビ放送", color: "bg-green-400" },
            { name: "大川 雅生", company: "フリーランス", color: "bg-blue-400" },
            { name: "田中 太郎", company: "三瀬谷ダム工業", color: "bg-purple-400" },
        ];

        function initCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = cards.map(c => `
                <div class="bg-white p-6 card-shadow flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full ${c.color}"></div>
                    <div>
                        <div class="font-bold text-lg">${c.name}</div>
                        <div class="text-sm text-gray-400">${c.company}</div>
                    </div>
                </div>
            `).join('');
        }

        function showPage(pageId) {
            ['keyword', 'dept', 'area'].forEach(p => {
                document.getElementById('page-' + p).classList.add('hidden');
                document.getElementById('btn-' + p).classList.remove('active-tab');
            });
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.getElementById('btn-' + pageId).classList.add('active-tab');
        }

        function filterCards() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('cardGrid');
            const filtered = cards.filter(c => c.name.toLowerCase().includes(val) || c.company.toLowerCase().includes(val));
            grid.innerHTML = filtered.map(c => `
                <div class="bg-white p-6 card-shadow flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full ${c.color}"></div>
                    <div>
                        <div class="font-bold text-lg">${c.name}</div>
                        <div class="text-sm text-gray-400">${c.company}</div>
                    </div>
                </div>
            `).join('');
        }

        initCards();
    </script>
</body>
</html>
