<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - キーワード</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #f5f7f9; }
        /* ログイン画面のスタイル */
        #loginOverlay { position: fixed; inset: 0; background: linear-gradient(135deg, #6fceca 0%, #5eabd5 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* メイン画面のスタイル */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); color: white; display: flex; flex-direction: column; padding-top: 60px; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: white; text-decoration: none; opacity: 0.8; }
        .nav-item img { width: 24px; margin-right: 15px; }
        .nav-item.active { opacity: 1; font-weight: bold; background: rgba(255,255,255,0.1); }
        .user-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255,255,255,0.2); }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 20px 40px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .search-bar { flex: 1; margin: 0 20px; padding: 12px 40px; border-radius: 30px; border: 1px solid #ddd; background: #f8fafc; }
        .card-grid { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .thumb { width: 70px; height: 70px; border-radius: 50%; background: #eee; object-fit: cover; }
    </style>
</head>
<body>
    <div id="loginOverlay" style="display:none;">
        <div class="login-box">
            <img src="logo.png" style="width:150px; margin-bottom:20px;">
            <input type="text" id="loginName" placeholder="名前を入力" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <select id="loginDept" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px;">
                <option value="報道制作部">報道制作部</option>
                <option value="制作技術部">制作技術部</option>
                <option value="放送技術部">放送技術部</option>
                <option value="本社営業部">本社営業部</option>
            </select>
            <button onclick="doLogin()" style="width:100%; padding:12px; background:#6fceca; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ログイン</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png">キーワード</a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png">部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png">エリア</a>
        <div class="user-area">
            <div id="uName" style="font-weight:bold;">---</div>
            <div onclick="doLogout()" style="font-size:12px; cursor:pointer; text-decoration:underline; opacity:0.7;">ログアウト</div>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <img src="icon-keyword.png" style="width:32px;">
            <input type="text" id="sInput" class="search-bar" placeholder="名刺を検索..." oninput="show()">
            <button style="background:#6fceca; color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold;">新規追加</button>
        </div>
        <div id="grid" class="card-grid"></div>
    </div>

    <script>
        function doLogin() {
            const n = document.getElementById('loginName').value;
            const d = document.getElementById('loginDept').value;
            if(!n) return alert('名前を入力してください');
            localStorage.setItem('currentUser', JSON.stringify({name:n, dept:d}));
            location.reload();
        }
        function doLogout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }
        function show() {
            const query = document.getElementById('sInput').value.toLowerCase();
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            data.filter(u => u.name.toLowerCase().includes(query) || u.company.toLowerCase().includes(query)).forEach(u => {
                grid.innerHTML += `<div class="card"><img src="${u.icon||'user-1.png'}" class="thumb"><div><b>${u.name}</b><br><small>${u.company}</small></div></div>`;
            });
        }
        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(!user) {
                document.getElementById('loginOverlay').style.display = 'flex';
            } else {
                document.getElementById('uName').innerText = user.name + " (" + user.dept + ")";
                show();
            }
        };
    </script>
</body>
</html>
