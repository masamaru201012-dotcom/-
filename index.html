<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど</title>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f5f7f9;
            overflow: hidden;
        }

        /* 左サイドメニュー */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%);
            display: flex;
            flex-direction: column;
            padding: 60px 0 0 0; /* 全体的に位置を下げるため上部余白をさらに追加 */
            color: white;
        }

        .logo-area {
            padding: 0 24px 80px; /* ロゴと下のメニューの間隔をさらに広げる */
            text-align: center;
        }

        .logo-area img {
            width: 95%; /* さらに大きく調整 */
            height: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 20px 30px; /* 上下の空き加減を調整 */
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8); /* 通常時は少し透過 */
            transition: 0.2s;
        }

        /* キーワードページなので「キーワード」を白く強調 */
        .nav-item.active {
            color: #ffffff;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15); /* 選択されている感のデザイン */
        }

        .nav-icon {
            width: 38px; /* アイコンをさらに大きく */
            height: 38px;
            margin-right: 18px;
            object-fit: contain;
        }

        /* メインコンテンツ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 40px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 600px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 15px 15px 60px;
            border-radius: 40px;
            border: 1px solid #e0e0e0;
            font-size: 16px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        .sort-container {
            position: relative;
        }

        .sort-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .sort-button img {
            height: 50px; /* 並び替えボタンも少し大きく */
            width: auto;
        }

        .sort-options {
            display: none; 
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 200px;
            border: 1px solid #eee;
        }

        .sort-options div {
            padding: 15px 20px;
            cursor: pointer;
        }

        .sort-options div:hover {
            background: #f0faff;
        }

        /* カードグリッド */
        .card-grid {
            padding: 0 50px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            overflow-y: auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #f0f0f0;
        }

        .user-thumb {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="nav-item active">
            <img src="icon-keyword.png" class="nav-icon"> キーワード
        </div>
        <div class="nav-item">
            <img src="icon-dept.png" class="nav-icon"> 部署
        </div>
        <div class="nav-item">
            <img src="icon-area.png" class="nav-icon"> エリア
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" placeholder="検索キーワードを入力">
            </div>

            <div class="sort-container">
                <button class="sort-button" onclick="toggleSort(event)">
                    <img src="btn-sort.png" alt="並び替え">
                </button>
                <div id="sortOptions" class="sort-options">
                    <div onclick="selectSort('最新順')">最新順</div>
                    <div onclick="selectSort('五十音順')">五十音順</div>
                    <div onclick="selectSort('五十音順（逆）')">五十音順（逆）</div>
                </div>
            </div>
        </div>

        <div class="card-grid" id="cardGrid"></div>
    </div>

    <script>
        function toggleSort(event) {
            event.stopPropagation();
            const options = document.getElementById('sortOptions');
            options.style.display = options.style.display === 'block' ? 'none' : 'block';
        }

        function selectSort(type) {
            document.getElementById('sortOptions').style.display = 'none';
        }

        window.onclick = function() {
            document.getElementById('sortOptions').style.display = 'none';
        }

        const userIcons = ['user-1.png', 'user-2.png', 'user-3.png', 'user-4.png', 'user-5.png', 'user-6.png'];
        const cardGrid = document.getElementById('cardGrid');

        for (let i = 0; i < 8; i++) {
            const randomIcon = userIcons[Math.floor(Math.random() * userIcons.length)];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${randomIcon}" class="user-thumb">
                <div class="card-info">
                    <div style="font-weight:bold; font-size:18px;">氏名サンプル</div>
                    <div style="color:#888; font-size:14px;">部署・役職サンプル</div>
                </div>
            `;
            cardGrid.appendChild(card);
        }
    </script>
</body>
</html>
