<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - キーワード</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding-top: 60px; color: white; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; cursor: pointer; font-size: 18px; color: rgba(255, 255, 255, 0.8); text-decoration: none; transition: 0.2s; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 40px 50px; display: flex; align-items: center; gap: 20px; }
        .search-container { position: relative; flex: 1; max-width: 500px; }
        .search-bar { width: 100%; padding: 18px 15px 18px 65px; border-radius: 40px; border: 1px solid #e0e0e0; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; }
        .header-right { display: flex; align-items: center; gap: 20px; margin-left: auto; }
        .add-button { background-color: #ffffff; border: 2px solid #6fceca; color: #6fceca; border-radius: 30px; padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .add-button:hover { background-color: #6fceca; color: white; }
        .card-grid { padding: 0 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; border: 1px solid #f0f0f0; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .user-thumb { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0faff; }
        .card-info { display: flex; flex-direction: column; }
        .card-name { font-weight: bold; font-size: 20px; color: #333; }
        .card-company { color: #666; font-size: 14px; }
        
        /* モーダル */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 30px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-button { position: absolute; top: 20px; right: 25px; font-size: 30px; border: none; background: none; color: #ccc; cursor: pointer; }
        .info-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .info-label { font-size: 12px; color: #aaa; font-weight: bold; margin-bottom: 5px; }
        .info-input { font-size: 16px; padding: 12px; border-radius: 12px; border: 1px solid #f0f0f0; background: #f8f9fa; outline: none; }
        .register-button { background: #6fceca; color: white; border: none; border-radius: 30px; padding: 15px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item active"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>
    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" placeholder="キーワードを入力" id="searchBar">
            </div>
            <div class="header-right"><button class="add-button" onclick="openAddModal()">＋ 追加</button></div>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>
    <div class="modal-overlay" id="modalOverlay"><div class="modal-content" id="modalContent"></div></div>

    <script>
        let userData = [{ name: '田中 太郎', company: '株式会社サンプル', dept: '制作技術部', title: 'カメラマン', email: 'tanaka@test.com', phone: '090-0000-0000', notes: '', icon: 'user-1.png' }];
        function renderCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = userData.map(user => `
                <div class="card">
                    <img src="${user.icon}" class="user-thumb">
                    <div class="card-info">
                        <div class="card-name">${user.name}</div>
                        <div class="card-company">${user.company}</div>
                    </div>
                </div>
            `).join('');
        }
        function openAddModal() {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <button class="close-button" onclick="closeModal()">×</button>
                <h3>名刺登録</h3>
                <div class="info-group"><label class="info-label">名前</label><input type="text" id="newName" class="info-input"></div>
                <div class="info-group"><label class="info-label">部署</label><input type="text" id="newDept" class="info-input"></div>
                <button class="register-button" onclick="registerCard()">登録</button>`;
            document.getElementById('modalOverlay').classList.add('open');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        function registerCard() {
            userData.push({ name: document.getElementById('newName').value, dept: document.getElementById('newDept').value, company: '自社', icon: 'user-1.png' });
            renderCards(); closeModal();
        }
        renderCards();
    </script>
</body>
</html>
