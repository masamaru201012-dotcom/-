<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - エリア</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); color: white; flex-shrink: 0; }
        .nav-item { display: flex; align-items: center; padding: 25px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; }
        .nav-item.active { color: white; font-weight: bold; background: rgba(255, 255, 255, 0.15); }
        .nav-icon { width: 30px; margin-right: 15px; }

        .main-container { flex: 1; display: flex; }
        .area-selector { flex: 1.1; padding: 30px; overflow-y: auto; background: white; border-right: 1px solid #eef2f6; }
        .region-block { margin-bottom: 30px; }
        .region-title { color: #5eabd5; border-left: 5px solid #6fceca; padding-left: 10px; margin-bottom: 15px; font-weight: bold; }
        .pref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; }
        .pref-btn { padding: 10px 5px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; color: #64748b; }
        .pref-btn:hover { background: #e0f4f3; color: #5eabd5; border-color: #6fceca; }

        .result-view { flex: 1; padding: 30px; background: #f8fafc; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; flex-direction: row; justify-content: center; position: sticky; top: 0; z-index: 10; }
            .nav-item { padding: 15px; font-size: 14px; flex-direction: column; }
            .main-container { flex-direction: column; height: auto; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" class="nav-icon"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"><span>部署</span></a>
        <a href="area.html" class="nav-item active"><img src="icon-area.png" class="nav-icon"><span>エリア</span></a>
    </div>
    <div class="main-container">
        <div class="area-selector">
            <h2 style="color:#5eabd5; margin-bottom:20px;">地域から探す</h2>
            <div id="areaGrid"></div>
        </div>
        <div class="result-view" id="resultArea">
            <h3 id="selectedTitle" style="color:#444;">エリアを選択してください</h3>
        </div>
    </div>

    <script>
        const regions = [
            { r: "北海道・東北", p: ["北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"] },
            { r: "関東", p: ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"] },
            { r: "中部・東海", p: ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県", "三重県"] },
            { r: "近畿", p: ["滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"] },
            { r: "中国・四国", p: ["鳥取県", "島根県", "岡山県", "広島県", "山口県", "徳島県", "香川県", "愛媛県", "高知県"] },
            { r: "九州・沖縄", p: ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"] }
        ];

        const grid = document.getElementById('areaGrid');
        regions.forEach(reg => {
            const section = document.createElement('div');
            section.className = 'region-block';
            section.innerHTML = `<div class="region-title">${reg.r}</div><div class="pref-grid">${reg.p.map(name => `<div class="pref-btn" onclick="document.getElementById('selectedTitle').innerText='${name}'">${name}</div>`).join('')}</div>`;
            grid.appendChild(section);
        });
    </script>
</body>
</html>
