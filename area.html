<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - エリア</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; height: auto; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; cursor: pointer; font-size: 18px; color: rgba(255, 255, 255, 0.8); text-decoration: none; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }
        .main-content { flex: 1; padding: 50px; }
        .area-section { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .area-title { color: #6fceca; border-left: 5px solid #6fceca; padding-left: 15px; margin-bottom: 20px; font-weight: bold; }
        .pref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .pref-btn { padding: 12px; background: #f0faff; border: 1px solid #d0efff; border-radius: 10px; text-align: center; cursor: pointer; color: #5eabd5; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item active"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>
    <div class="main-content">
        <div class="area-section">
            <div class="area-title">東海</div>
            <div class="pref-grid">
                <div class="pref-btn">三重県</div>
                <div class="pref-btn">愛知県</div>
                <div class="pref-btn">岐阜県</div>
                <div class="pref-btn">静岡県</div>
            </div>
        </div>
    </div>
</body>
</html>
