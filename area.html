<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - エリア</title>
    <style>
        /* index.html のCSSを継承 */
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; }
        .user-profile-area { margin-top: auto; padding: 25px; border-top: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.05); }
        .main-container { flex: 1; display: flex; overflow: hidden; }
        .area-selector { flex: 1; padding: 30px; background: white; border-right: 1px solid #eef2f6; overflow-y: auto; }
        .pref-btn { padding: 10px; background: #f8fafc; border: 1px solid #eee; border-radius: 8px; margin: 5px; cursor: pointer; display: inline-block; font-size: 13px; }
        .result-view { flex: 1; padding: 30px; background: #f8fafc; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" style="width:100%"></div>
        <a href="index.html" class="nav-item"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><span>部署</span></a>
        <a href="area.html" class="nav-item active"><span>エリア</span></a>
        <div class="user-profile-area">
            <div class="user-name" id="displayUserName">---</div>
            <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
        </div>
    </div>

    <div class="main-container">
        <div class="area-selector">
            <h2 style="color:#5eabd5;">エリア別ファイル</h2>
            <div id="areaGrid"></div>
        </div>
        <div class="result-view" id="resultArea">
            <h3 id="selectedTitle">エリアを選択してください</h3>
            <div id="cardGrid"></div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" style="max-width:90%; max-height:90%;"></div>

    <script>
        function checkLogin() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { location.href = "index.html"; }
            else { document.getElementById('displayUserName').innerText = user.name + " (" + user.dept + ")"; }
        }
        function handleLogout() { localStorage.removeItem('currentUser'); location.href = "index.html"; }

        const prefs = ["北勢", "中南勢", "伊勢志摩", "伊賀", "東紀州", "愛知県", "岐阜県", "東京都", "大阪府"];
        const grid = document.getElementById('areaGrid');
        prefs.forEach(p => {
            grid.innerHTML += `<div class="pref-btn" onclick="showArea('${p}')">${p}</div>`;
        });

        function showArea(areaName) {
            document.getElementById('selectedTitle').innerText = areaName + "の名刺";
            const cGrid = document.getElementById('cardGrid');
            cGrid.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            data.filter(u => u.area === areaName).forEach(user => {
                const c = document.createElement('div');
                c.className = 'card';
                c.onclick = () => { if(user.icon){ document.getElementById('imageModal').style.display='flex'; document.getElementById('modalImg').src=user.icon; }};
                c.innerHTML = `<div><div style="font-weight:bold;">${user.name}</div><div style="font-size:12px;">${user.company}</div><div style="font-size:11px; color:#5eabd5;">👤 登録者: ${user.registeredBy}</div></div>`;
                cGrid.appendChild(c);
            });
        }
        window.onload = checkLogin;
    </script>
</body>
</html>
