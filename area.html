<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - エリア別</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .main-container { flex: 1; display: flex; overflow: hidden; }
        .area-selector { width: 320px; padding: 30px; overflow-y: auto; background: white; border-right: 1px solid #eef2f6; }
        .pref-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .area-btn { padding: 10px; border-radius: 8px; border: 1px solid #f0f4f8; background: #fff; font-size: 13px; cursor: pointer; text-align: center; transition: 0.2s; }
        .area-btn:hover { border-color: #6fceca; color: #5eabd5; }
        .result-view { flex: 1; padding: 40px; overflow-y: auto; background: #f8fafc; }
        .result-header { font-size: 20px; font-weight: bold; color: #444; margin-bottom: 25px; border-bottom: 2px solid #6fceca; padding-bottom: 10px; }
        .card-list { display: flex; flex-direction: column; gap: 15px; max-width: 450px; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .thumb-box { width: 80px; height: 80px; border-radius: 50%; background-color: #e0f4f3; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" style="width:100%;"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png"><span>部署</span></a>
        <a href="area.html" class="nav-item active"><img src="icon-area.png"><span>エリア</span></a>
    </div>
    <div class="main-container">
        <div class="area-selector">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <img src="icon-area.png" style="width:32px;">
                <h2 style="font-size:18px; color:#5eabd5; margin:0;">エリア別</h2>
            </div>
            <div class="pref-grid" id="prefGrid"></div>
        </div>
<div class="result-view">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #6fceca; padding-bottom: 15px;">
                <img src="icon-area.png" style="width: 32px; height: 32px;">
                <div id="selectedAreaName" style="font-size: 20px; font-weight: bold; color: #444;">都道府県を選択してください</div>
            </div>
            <div id="cardGrid" class="card-list"></div>
        </div>
    <script>
        const prefs = ["三重県", "愛知県", "岐阜県", "滋賀県", "東京都", "大阪府"];
        const pGrid = document.getElementById('prefGrid');
        prefs.forEach(p => {
            const btn = document.createElement('button'); btn.className = 'area-btn'; btn.innerText = p;
            btn.onclick = () => selectArea(p);
            pGrid.appendChild(btn);
        });
        function selectArea(areaName) {
            document.getElementById('selectedAreaName').innerText = areaName + "の名刺一覧";
            const grid = document.getElementById('cardGrid'); grid.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            data.filter(u => u.area === areaName).forEach(user => {
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<div class="thumb-box"><img src="${user.icon ? user.icon : 'user-1.png'}"></div>
                <div><div style="font-weight:bold; font-size:18px;">${user.name}</div><div style="font-size:14px; color:#888;">${user.company || ''}</div></div>`;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
