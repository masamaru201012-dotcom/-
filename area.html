<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - 部署別</title>
    <style>
        /* 既存のベースデザインを継承 */
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; opacity: 0.8; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-item.active img { opacity: 1; }
        
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #ffffff; }
        .logout-btn { font-size: 12px; color: rgba(255, 255, 255, 0.6); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }

        /* メインコンテンツエリア */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 60px; }
        .page-title { font-size: 24px; font-weight: bold; color: #444; margin-bottom: 40px; display: flex; align-items: center; gap: 15px; }
        .page-title img { width: 32px; height: 32px; }

        /* フォルダグリッドレイアウト（画像の中央部分を再現） */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; max-width: 1100px; }
        
        .folder-card { 
            background: white; border-radius: 15px; padding: 30px 20px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid #eef2f6; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-decoration: none;
        }
        .folder-card:hover { transform: translateY(-5px); border-color: #6fceca; box-shadow: 0 10px 25px rgba(111, 206, 202, 0.15); }
        
        /* フォルダアイコンのビジュアル */
        .folder-icon { 
            width: 80px; height: 60px; background: #f0f4f8; border-radius: 4px 10px 4px 4px; 
            margin-bottom: 20px; position: relative; 
            background: linear-gradient(135deg, #a5d6d4 0%, #6fceca 100%);
        }
        .folder-icon::before { 
            content: ""; position: absolute; top: -8px; left: 0; 
            width: 35px; height: 10px; background: #5eabd5; border-radius: 3px 3px 0 0; 
        }
        
        .dept-name { font-weight: bold; color: #444; font-size: 16px; text-align: center; }
        .card-count { font-size: 12px; color: #999; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="名刺くらうど"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item active"><img src="icon-dept.png"><span>部署</span></a>
        <a href="area.html" class="nav-item"><img src="icon-area.png"><span>エリア</span></a>
        
        <div class="user-profile-area">
            <div class="user-name">清水　茉咲 (制作技術部)</div>
            <button class="logout-btn">ログアウト</button>
        </div>
    </div>

    <div class="main-container">
        <div class="page-title">
            <img src="icon-dept.png">
            <span>部署別フォルダ</span>
        </div>

        <div class="folder-grid" id="folderGrid">
            </div>
    </div>

    <script>
        const departments = [
            "総務部", "本社営業部", "東京支社", "大阪支社", 
            "名古屋支社", "事業部", "編成部", "放送部", 
            "業務部", "報道制作部", "制作技術部", "放送技術部"
        ];

        const grid = document.getElementById('folderGrid');

        departments.forEach(dept => {
            const card = document.createElement('a');
            card.href = `#`; // 各部署の詳細ページリンク
            card.className = 'folder-card';
            
            // 名刺くらうどの世界観に合わせたフォルダ構造
            card.innerHTML = `
                <div class="folder-icon"></div>
                <div class="dept-name">${dept}</div>
                <div class="card-count">名刺を読み込む</div>
            `;
            
            card.onclick = (e) => {
                e.preventDefault();
                alert(`${dept}フォルダを開きます。メールアドレスの登録状況を確認してください。`);
            };

            grid.appendChild(card);
        });
    </script>
</body>
</html>
