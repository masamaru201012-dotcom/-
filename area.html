<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - エリア別</title>
    <style>
        /* ヘッダー・サイドバー・基本レイアウトは全ページ完全共通 */
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; z-index: 3000; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; transition: 0.3s; }
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; opacity: 0.8; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 5px; }
        .logout-link { font-size: 12px; color: rgba(255,255,255,0.6); cursor: pointer; text-decoration: underline; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eef2f6; box-shadow: 0 2px 5px rgba(0,0,0,0.02); flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 15px; width: 250px; }
        .header-title-icon { width: 32px; height: 32px; }
        .header-title { font-size: 20px; font-weight: bold; color: #444; }
        .search-placeholder { flex: 1; max-width: 400px; height: 40px; }
        .header-right { width: 250px; display: flex; justify-content: flex-end; }
        .add-button { background:#6fceca; color:white; border:none; padding:12px 24px; border-radius:30px; font-weight:bold; cursor:pointer; }

        /* エリア専用：47都道府県リスト */
        .content-container { flex: 1; display: flex; overflow: hidden; }
        .side-list { width: 300px; background: white; border-right: 1px solid #eef2f6; padding: 20px; overflow-y: auto; }
        .region-label { font-size: 13px; color: #999; font-weight: bold; margin: 15px 0 8px 10px; border-left: 3px solid #6fceca; padding-left: 10px; }
        .list-item { padding: 10px 15px; cursor: pointer; border-radius: 8px; font-size: 14px; font-weight: bold; color: #555; margin-bottom: 2px; }
        .list-item:hover { background: #f0faff; color: #5eabd5; }
        
        .main-view { flex: 1; padding: 40px; overflow-y: auto; background: #f8fafc; }
        .view-title { font-size: 18px; font-weight: bold; color: #444; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid #6fceca; }
        .card-list { display: flex; flex-direction: column; gap: 15px; max-width: 480px; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .thumb-box { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; background: #eee; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png"><span>部署</span></a>
        <a href="area.html" class="nav-item active"><img src="icon-area.png"><span>エリア</span></a>
        <div class="user-profile-area">
            <div class="user-name">清水 (報道制作部)</div>
            <div class="logout-link">ログアウト</div>
        </div>
    </div>
    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <img src="icon-area.png" class="header-title-icon">
                <div class="header-title">エリア別</div>
            </div>
            <div class="search-placeholder"></div>
            <div class="header-right">
                <button class="add-button">新規追加</button>
            </div>
        </div>
        <div class="content-container">
            <div class="side-list" id="areaList"></div>
            <div class="main-view">
                <div id="viewTitle" class="view-title">都道府県を選択してください</div>
                <div id="cardGrid" class="card-list"></div>
            </div>
        </div>
    </div>
    <script>
        const regions = [
            { n: "北海道・東北", p: ["北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"] },
            { n: "関東", p: ["東京都", "神奈川県", "埼玉県", "千葉県", "茨城県", "栃木県", "群馬県"] },
            { n: "中部", p: ["三重県", "愛知県", "岐阜県", "静岡県", "新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県"] },
            { n: "近畿", p: ["大阪府", "兵庫県", "京都府", "滋賀県", "奈良県", "和歌山県"] },
            { n: "中国", p: ["鳥取県", "島根県", "岡山県", "広島県", "山口県"] },
            { n: "四国", p: ["徳島県", "香川県", "愛媛県", "高知県"] },
            { n: "九州・沖縄", p: ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"] }
        ];

        const aContainer = document.getElementById('areaList');
        regions.forEach(reg => {
            const label = document.createElement('div');
            label.className = 'region-label';
            label.innerText = reg.n;
            aContainer.appendChild(label);
            reg.p.forEach(p => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerText = p;
                div.onclick = () => selectArea(p);
                aContainer.appendChild(div);
            });
        });

        function selectArea(name) {
            document.getElementById('viewTitle').innerText = name + "の名刺一覧";
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            data.filter(u => u.area === name).forEach(user => {
                grid.innerHTML += `<div class="card">
                    <div class="thumb-box"><img src="${user.icon||'user-1.png'}"></div>
                    <div><div style="font-weight:bold; font-size:18px;">${user.name}</div><div style="font-size:14px; color:#888;">${user.company}</div></div>
                </div>`;
            });
        }
    </script>
</body>
</html>
