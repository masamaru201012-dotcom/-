<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - エリア</title>
    <style>
        /* Sidebar/Base CSS */
        body { margin: 0; font-family: "Helvetica Neue", sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding-top: 60px; color: white; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; cursor: pointer; font-size: 18px; color: rgba(255,255,255,0.8); text-decoration: none; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255,255,255,0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; }

        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 40px 50px; font-size: 24px; font-weight: bold; color: #333; }

        .area-container { padding: 0 50px; display: flex; flex-direction: column; gap: 20px; }
        
        .area-selector {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
        }

        select {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #6fceca;
            outline: none;
            color: #444;
            appearance: none; /* デフォルトの矢印を消す */
            background: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236fceca' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") no-repeat right 15px center;
            background-size: 20px;
        }

        .area-list {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .area-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .area-btn:hover { background: #f0faff; border-color: #6fceca; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item active"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>
    <div class="main-content">
        <div class="header">エリアを選択</div>
        <div class="area-container">
            <div class="area-selector">
                <select id="prefSelect" onchange="alert(this.value + 'の名刺を表示します')">
                    <option value="">都道府県を選択</option>
                    <option value="東京都">東京都</option>
                    <option value="大阪府">大阪府</option>
                    <option value="三重県">三重県</option>
                    <option value="愛知県">愛知県</option>
                </select>

                <div class="area-list">
                    <div class="area-btn" onclick="alert('東海エリアを表示')">東海</div>
                    <div class="area-btn" onclick="alert('関東エリアを表示')">関東</div>
                    <div class="area-btn" onclick="alert('関西エリアを表示')">関西</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
