<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - エリア別</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; z-index: 3000; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; transition: 0.3s; }
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; opacity: 0.8; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-item.active img { opacity: 1; }
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #ffffff; }
        .logout-btn { font-size: 12px; color: rgba(255, 255, 255, 0.6); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
        .main-container { flex: 1; display: flex; overflow: hidden; }
        .area-selector { width: 320px; padding: 30px 20px; overflow-y: auto; background: white; border-right: 1px solid #eef2f6; }
        .region-group { margin-bottom: 25px; }
        .region-title { font-size: 12px; font-weight: bold; color: #5eabd5; margin-bottom: 10px; border-left: 3px solid #6fceca; padding-left: 10px; }
        .pref-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .area-btn { padding: 8px; border-radius: 8px; border: 1px solid #f0f4f8; background: #fff; font-size: 13px; cursor: pointer; text-align: center; }
        .area-btn:hover { border-color: #6fceca; color: #5eabd5; }
        .area-btn.active { background: #6fceca; color: white; font-weight: bold; }
        .result-view { flex: 1; padding: 40px; overflow-y: auto; background: #f8fafc; }
        .result-header { font-size: 20px; font-weight: bold; color: #444; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid #6fceca; }
        
        /* ★一列表示用にリスト形式のスタイルを適用 */
        .card-list { display: flex; flex-direction: column; gap: 15px; max-width: 400px; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; border: 1px solid #eef2f6; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .card:hover { transform: translateY(-5px); border-color: #6fceca; }
        .thumb-box { width: 80px; height: 80px; border-radius: 50%; background-color: #e0f4f3; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 2px solid #fff; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; }
        .modal-img { max-width: 95%; max-height: 90%; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item"><img src="icon-key.png"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png"><span>部署</span></a>
        <a href="area.html" class="nav-item active"><img src="icon-area.png"><span>エリア</span></a>
        <div class="user-profile-area">
            <div class="user-name" id="displayUserName">---</div>
            <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
        </div>
    </div>
    <div class="main-container">
        <div class="area-selector" id="areaSelector">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                <img src="icon-area.png" style="width: 32px; height: 32px;">
                <h2 style="color:#5eabd5; margin: 0; font-size: 18px;">エリア別ファイル</h2>
            </div>
        </div>
        <div class="result-view">
            <div id="selectedAreaName" class="result-header">都道府県を選択してください</div>
            <div id="cardGrid" class="card-list"></div>
        </div>
    </div>
    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" class="modal-img"></div>
    <script>
        const regions = { "三重・東海": ["三重県", "愛知県", "岐阜県", "静岡県"], "北海道・東北": ["北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"], "関東": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"], "北陸・甲信越": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県"], "近畿": ["滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"], "中国": ["鳥取県", "島根県", "岡山県", "広島県", "山口県"], "四国": ["徳島県", "香川県", "愛媛県", "高知県"], "九州・沖縄": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"] };
        const selector = document.getElementById('areaSelector');
        for (const [region, prefs] of Object.entries(regions)) {
            const group = document.createElement('div'); group.className = 'region-group';
            group.innerHTML = `<div class="region-title">${region}</div>`;
            const grid = document.createElement('div'); grid.className = 'pref-grid';
            prefs.forEach(pref => {
                const btn = document.createElement('button'); btn.className = 'area-btn'; btn.innerText = pref;
                btn.onclick = () => { document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectArea(pref); };
                grid.appendChild(btn);
            }); group.appendChild(grid); selector.appendChild(group);
        }
        function checkLogin() { const user = JSON.parse(localStorage.getItem('currentUser')); if (!user) { location.href = "index.html"; } else { document.getElementById('displayUserName').innerText = user.name + " (" + user.dept + ")"; } }
        function selectArea(areaName) {
            document.getElementById('selectedAreaName').innerText = areaName + "の名刺一覧";
            const grid = document.getElementById('cardGrid'); grid.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            data.filter(u => u.area === areaName).forEach(user => {
                const randomIconId = Math.floor(Math.random() * 6) + 1;
                const card = document.createElement('div'); card.className = 'card';
                card.onclick = () => { if(user.icon && user.icon !== ""){ document.getElementById('imageModal').style.display='flex'; document.getElementById('modalImg').src = user.icon; } else { alert("画像はありません。"); } };
                card.innerHTML = `<div class="thumb-box"><img src="${user.icon ? user.icon : 'user-'+randomIconId+'.png'}" onerror="this.style.display='none'"></div>
                <div><div style="font-weight:bold; font-size:18px; color:#333;">${user.name}</div><div style="font-size:14px; color:#888;">${user.company || ''} / ${user.dept || ''}</div></div>`;
                grid.appendChild(card);
            });
        }
        window.onload = checkLogin;
    </script>
</body>
</html>
