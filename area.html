<div class="main-content">
    <div class="filter-container" id="areaFilters">
        <button class="filter-btn active" onclick="filterArea('すべて', this)">すべて</button>
        <button class="filter-btn" onclick="filterArea('津', this)">津</button>
        <button class="filter-btn" onclick="filterArea('四日市', this)">四日市</button>
        <button class="filter-btn" onclick="filterArea('伊勢', this)">伊勢</button>
        <button class="filter-btn" onclick="filterArea('東京', this)">東京</button>
    </div>
    <div class="card-grid" id="cardGrid"></div>
</div>

<script>
    // userDataの読み込みは共通
    let currentArea = 'すべて';

    function filterArea(area, btn) {
        currentArea = area;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateDisplay();
    }

    function updateDisplay() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = "";
        // 備考欄（memo）に地名が含まれているか、または特定のエリア項目がある場合にフィルタリング
        userData.filter(u => currentArea === 'すべて' || (u.memo && u.memo.includes(currentArea))).forEach(user => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openDetail(user);
            card.innerHTML = `<div class="thumb-box"><img src="${user.icon}"></div><div class="card-name" style="font-weight:bold; font-size:20px;">${user.name}</div>`;
            grid.appendChild(card);
        });
    }
    // openDetailなどは共通
</script>
