<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - エリア</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .filter-container { padding: 30px 50px 10px; display: flex; flex-wrap: wrap; gap: 12px; overflow-y: auto; max-height: 200px; }
        .filter-btn { padding: 10px 24px; border-radius: 25px; border: 1px solid #ddd; background: white; color: #666; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { background: #5eabd5; color: white; border-color: #5eabd5; }

        .card-grid { padding: 20px 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; cursor: pointer; }
        .thumb-box { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0faff; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" style="width:100%;"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" style="width:38px; margin-right:18px;"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item"><img src="icon-dept.png" style="width:38px; margin-right:18px;"><span>部署</span></a>
        <a href="area.html" class="nav-item active"><img src="icon-area.png" style="width:38px; margin-right:18px;"><span>エリア</span></a>
    </div>
    <div class="main-content">
        <div class="filter-container" id="areaButtons">
            <button class="filter-btn active" onclick="filterArea('すべて', this)">すべて</button>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>
    <script>
        const prefs = ["北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県", "茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県", "新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県", "三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県", "鳥取県", "島根県", "岡山県", "広島県", "山口県", "徳島県", "香川県", "愛媛県", "高知県", "福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"];
        let userData = JSON.parse(localStorage.getItem('myCards')) || [];
        const btnContainer = document.getElementById('areaButtons');
        prefs.forEach(p => {
            const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.innerText = p;
            btn.onclick = (e) => filterArea(p, e.target); btnContainer.appendChild(btn);
        });
        function filterArea(area, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            userData.filter(u => area === 'すべて' || (u.memo && u.memo.includes(area))).forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="thumb-box"><img src="${user.icon}"></div><div style="font-weight:bold; font-size:20px;">${user.name}</div>`;
                grid.appendChild(card);
            });
        }
        window.onload = () => filterArea('すべて', document.querySelector('.filter-btn'));
    </script>
</body>
</html>
