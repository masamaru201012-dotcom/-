<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - 部署</title>
    <style>
        /* 基本レイアウト */
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; height: auto; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }

        .main-container { flex: 1; display: flex; }
        .dept-selector { flex: 1; padding: 40px; overflow-y: auto; background: white; border-right: 1px solid #eef2f6; }
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        
        /* フォルダデザイン修正：渋すぎない爽やかカラー */
        .dept-folder { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 15px; border-radius: 15px; transition: 0.2s; }
        .dept-folder:hover { background: #f0faff; transform: translateY(-3px); }
        .folder-icon { width: 60px; height: 45px; margin-bottom: 10px; position: relative; border-radius: 4px 10px 4px 4px; }
        .folder-icon::before { content: ""; position: absolute; top: -6px; left: 0; width: 22px; height: 10px; background: inherit; border-radius: 4px 4px 0 0; }
        .dept-name { font-size: 13px; font-weight: bold; color: #555; text-align: center; }

        /* カラーバリエーション：少し彩度をプラス */
        .f-aqua { background: linear-gradient(135deg, #a2d9ce, #76d7c4); }
        .f-sky { background: linear-gradient(135deg, #aed6f1, #85c1e9); }
        .f-lavender { background: linear-gradient(135deg, #d2b4de, #bb8fce); }
        .f-mint { background: linear-gradient(135deg, #abebc6, #82e0aa); }
        .f-ash { background: linear-gradient(135deg, #d5dbdb, #aeb6bf); }

        .result-view { flex: 1.2; padding: 40px; overflow-y: auto; background: #f8fafc; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item active"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>
    <div class="main-container">
        <div class="dept-selector">
            <h2 style="color:#5eabd5; margin-bottom:30px;">部署から探す</h2>
            <div class="dept-grid">
                <script>
                    const depts = [
                        {n:'報道制作部', c:'f-sky'}, {n:'制作技術部', c:'f-aqua'},
                        {n:'本社営業部', c:'f-ash'}, {n:'名古屋支社', c:'f-lavender'},
                        {n:'東京支社', c:'f-sky'}, {n:'大阪支社', c:'f-aqua'}, 
                        {n:'総務部', c:'f-ash'}, {n:'業務部', c:'f-mint'},
                        {n:'放送部', c:'f-sky'}, {n:'事業部', c:'f-lavender'}, {n:'編成部', c:'f-mint'}
                    ];
                    document.write(depts.map(d => `
                        <div class="dept-folder" onclick="alert('${d.n}のリストを表示')">
                            <div class="folder-icon ${d.c}"></div>
                            <div class="dept-name">${d.n}</div>
                        </div>
                    `).join(''));
                </script>
            </div>
        </div>
        <div class="result-view">
            <div id="resultContent" style="color:#bbb;">部署を選択してください</div>
        </div>
    </div>
</body>
</html>
