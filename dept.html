<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - 部署別</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        
        /* サイドバー共通スタイル */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; z-index: 3000; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 25px 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        
        .user-profile-area { margin-top: auto; padding: 25px; border-top: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.05); }
        .user-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .logout-btn { font-size: 11px; color: rgba(255,255,255,0.7); cursor: pointer; border: none; background: none; text-decoration: underline; padding: 0; }

        .main-container { flex: 1; display: flex; overflow: hidden; }

        /* 部署フォルダエリア */
        .dept-selector { flex: 1; padding: 40px; overflow-y: auto; background: white; border-right: 1px solid #eef2f6; }
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .dept-folder { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 15px; border-radius: 15px; transition: 0.2s; }
        .dept-folder:hover { background: #f0faff; transform: translateY(-3px); }
        .folder-icon { width: 60px; height: 45px; background: #85c1e9; border-radius: 4px 10px 4px 4px; position: relative; margin-bottom: 10px; }
        .folder-icon::before { content: ""; position: absolute; top: -6px; left: 0; width: 22px; height: 10px; background: inherit; border-radius: 4px 4px 0 0; }
        
        /* リスト表示エリア */
        .result-view { flex: 1.2; padding: 40px; overflow-y: auto; background: #f8fafc; }
        .result-header { font-size: 20px; font-weight: bold; color: #444; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid #6fceca; }
        .card { background: white; border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: #6fceca; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .thumb-box { width: 60px; height: 60px; border-radius: 50%; background: #e0f4f3; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #5eabd5; overflow: hidden; position: relative; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .owner-tag { font-size: 11px; color: #5eabd5; background: #e0f4f3; padding: 3px 10px; border-radius: 12px; display: inline-block; margin-top: 8px; }

        /* 拡大モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; }
        .modal-img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item active"><span>部署</span></a>
        <a href="area.html" class="nav-item"><span>エリア</span></a>
        
        <div class="user-profile-area">
            <div class="user-name" id="displayUserName">---</div>
            <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
        </div>
    </div>

    <div class="main-container">
        <div class="dept-selector">
            <h2 style="color:#5eabd5; margin-bottom:30px;">部署別ファイル</h2>
            <div class="dept-grid" id="deptGrid"></div>
        </div>
        <div class="result-view">
            <div id="selectedDeptName" class="result-header">部署を選択してください</div>
            <div id="cardGrid"></div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <img id="modalImg" class="modal-img" src="">
    </div>

    <script>
        // ログインチェック（index.htmlへ戻す）
        function checkLogin() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                location.href = "index.html";
            } else {
                document.getElementById('displayUserName').innerText = user.name + " (" + user.dept + ")";
            }
        }

        function handleLogout() {
            localStorage.removeItem('currentUser');
            location.href = "index.html";
        }

        function openModal(imgSrc) {
            if (!imgSrc) return;
            document.getElementById('imageModal').style.display = 'flex';
            document.getElementById('modalImg').src = imgSrc;
        }

        // 部署リスト（★放送技術部を追加しました）
        const depts = [
            "報道制作部", "制作技術部", "放送技術部", "本社営業部", 
            "名古屋支社", "東京支社", "大阪支社", "放送部", 
            "事業部", "編成部", "総務部"
        ];

        const dGrid = document.getElementById('deptGrid');
        depts.forEach(d => {
            const folder = document.createElement('div');
            folder.className = 'dept-folder';
            folder.onclick = () => selectDept(d);
            folder.innerHTML = `<div class="folder-icon"></div><div style="font-size:12px; font-weight:bold; color:#555;">${d}</div>`;
            dGrid.appendChild(folder);
        });

        function selectDept(deptName) {
            document.getElementById('selectedDeptName').innerText = deptName + "が獲得した名刺";
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            
            // 登録した人の部署（ownerDept）でフィルター
            const filtered = data.filter(u => u.ownerDept === deptName);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div style="color:#888; padding:20px;">この部署が登録した名刺はまだありません。</div>`;
            } else {
                filtered.forEach(user => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openModal(user.icon);
                    card.innerHTML = `
                        <div class="thumb-box">
                            ${user.name.charAt(0)}
                            ${user.icon ? `<img src="${user.icon}">` : ''}
                        </div>
                        <div>
                            <div style="font-weight:bold; font-size:17px;">${user.name}</div>
                            <div style="font-size:12px; color:#888;">${user.company || ''}</div>
                            <div class="owner-tag">👤 登録者: ${user.registeredBy}</div>
                        </div>`;
                    grid.appendChild(card);
                });
            }
        }

        window.onload = checkLogin;
    </script>
</body>
</html>
