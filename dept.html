<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - 部署</title>
    <style>
        /* CSSは index.html と共通 */
        body { margin: 0; font-family: "Helvetica Neue", sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; height: auto; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 30px 30px; cursor: pointer; font-size: 18px; color: rgba(255, 255, 255, 0.8); text-decoration: none; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }
        .main-content { flex: 1; padding: 50px; overflow-y: auto; }

        /* 部署ページ専用：ファイルデザイン */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 40px; }
        .file-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s; }
        .file-item:hover { transform: scale(1.05); }
        .file-icon {
            width: 140px; height: 100px; background-color: #ffd863; border-radius: 0 15px 10px 10px;
            position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center;
        }
        .file-icon::before {
            content: ""; position: absolute; top: -12px; left: 0; width: 60px; height: 15px;
            background-color: #ffd863; border-radius: 8px 8px 0 0;
        }
        .dept-label { margin-top: 15px; font-weight: bold; color: #555; text-align: center; font-size: 16px; }
        .dept-name-on-file { font-size: 13px; color: #8a732d; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item active"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>
    <div class="main-content">
        <div class="file-grid">
            <div class="file-item">
                <div class="file-icon"><span class="dept-name-on-file">制作技術部</span></div>
                <div class="dept-label">制作技術部</div>
            </div>
            <div class="file-item">
                <div class="file-icon"><span class="dept-name-on-file">報道制作部</span></div>
                <div class="dept-label">報道制作部</div>
            </div>
        </div>
    </div>
</body>
</html>
