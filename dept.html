<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - 部署</title>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f5f7f9;
            overflow: hidden;
        }

        /* --- 左サイドメニュー --- */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%);
            display: flex;
            flex-direction: column;
            padding: 60px 0 0 0;
            color: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .logo-area {
            padding: 0 20px 80px;
            text-align: center;
        }

        .logo-area img {
            width: 100%;
            height: auto;
            transform: scale(1.1);
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 30px 30px;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-item.active {
            color: #ffffff;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 0 30px 30px 0;
            margin-right: 20px;
        }

        .nav-icon {
            width: 38px;
            height: 38px;
            margin-right: 18px;
            object-fit: contain;
        }

        /* --- メインコンテンツ --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 40px 50px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 500px;
        }

        .search-bar {
            width: 100%;
            padding: 18px 15px 18px 65px;
            border-radius: 40px;
            border: 1px solid #e0e0e0;
            background-color: white;
            font-size: 16px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .add-button {
            background-color: #ffffff;
            border: 2px solid #6fceca;
            color: #6fceca;
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .add-button:hover {
            background-color: #6fceca;
            color: white;
        }

        .sort-container {
            position: relative;
        }

        .sort-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
        }

        .sort-button img {
            height: 55px;
            width: auto;
        }

        .sort-options {
            display: none;
            position: absolute;
            top: 65px;
            right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 3000;
            min-width: 200px;
            border: 1px solid #eee;
            overflow: hidden;
        }

        .sort-options div {
            padding: 15px 20px;
            cursor: pointer;
            color: #444;
        }

        .sort-options div:hover {
            background: #f0faff;
        }

        /* --- カード一覧 --- */
        .card-grid {
            padding: 0 50px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            overflow-y: auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #f0f0f0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .user-thumb {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #f0faff;
        }

        .card-info { display: flex; flex-direction: column; }
        .card-name { font-weight: bold; font-size: 20px; color: #333; margin-bottom: 5px; }
        .card-company { color: #666; font-size: 14px; margin-bottom: 2px; }
        .card-title { color: #888; font-size: 14px; }

        /* --- モーダル --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); z-index: 4000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-content {
            background-color: white; width: 90%; max-width: 500px; border-radius: 30px; padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); position: relative; transform: scale(0.9); transition: transform 0.3s;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.open .modal-content { transform: scale(1); }
        .close-button { position: absolute; top: 20px; right: 25px; font-size: 30px; background: none; border: none; color: #ccc; cursor: pointer; }

        .modal-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0faff; padding-bottom: 20px; }
        .modal-thumb { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #f0faff; margin-bottom: 15px; }
        .modal-name { font-size: 28px; font-weight: bold; color: #333; }

        .modal-body { display: flex; flex-direction: column; gap: 15px; }
        .info-group { display: flex; flex-direction: column; }
        .info-label { font-size: 12px; color: #aaa; font-weight: bold; margin-bottom: 5px; }
        .info-value, .info-input { font-size: 16px; color: #444; background-color: #f8f9fa; padding: 12px 15px; border-radius: 12px; border: 1px solid #f0f0f0; }
        .info-input { outline: none; }

        .register-button {
            background-color: #6fceca;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.png" alt="Logo"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" class="nav-icon"> キーワード</a>
        <a href="dept.html" class="nav-item active"><img src="icon-dept.png" class="nav-icon"> 部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"> エリア</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="search-container">
                <img src="icon-search.png" class="search-icon">
                <input type="text" class="search-bar" placeholder="部署を入力" id="searchBar">
            </div>

            <div class="header-right">
                <button class="add-button" onclick="openAddModal()">＋ 追加</button>
                <div class="sort-container">
                    <button class="sort-button" id="sortBtn">
                        <img src="btn-sort.png" alt="並び替え">
                    </button>
                    <div id="sortOptions" class="sort-options">
                        <div onclick="selectSort('最新順')">最新順</div>
                        <div onclick="selectSort('五十音順')">五十音順</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-grid" id="cardGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        let userData = [
            { name: '鈴木 一郎', company: 'テックソリューションズ', dept: 'システム開発課', title: 'エンジニア', email: 'suzuki@tech.io', phone: '080-5555-7777', notes: 'API連携について確認済み。', icon: 'user-3.png' }
        ];

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            userData.forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetailModal(user);
                card.innerHTML = `
                    <img src="${user.icon}" class="user-thumb">
                    <div class="card-info">
                        <div class="card-name">${user.name}</div>
                        <div class="card-company">${user.company}</div>
                        <div class="card-title">${user.title}</div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function openDetailModal(user) {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <button class="close-button" onclick="closeModal()">×</button>
                <div class="modal-header">
                    <img src="${user.icon}" class="modal-thumb">
                    <div class="modal-name">${user.name}</div>
                </div>
                <div class="modal-body">
                    <div class="info-group"><div class="info-label">会社名</div><div class="info-value">${user.company}</div></div>
                    <div class="info-group"><div class="info-label">部署名</div><div class="info-value">${user.dept}</div></div>
                    <div class="info-group"><div class="info-label">役職</div><div class="info-value">${user.title}</div></div>
                    <div class="info-group"><div class="info-label">メールアドレス</div><div class="info-value">${user.email}</div></div>
                    <div class="info-group"><div class="info-label">電話番号</div><div class="info-value">${user.phone}</div></div>
                    <div class="info-group"><div class="info-label">備考</div><div class="info-value">${user.notes}</div></div>
                </div>`;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function openAddModal() {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <button class="close-button" onclick="closeModal()">×</button>
                <div class="modal-header"><div class="modal-name">名刺の登録</div></div>
                <div class="modal-body">
                    <input type="text" id="newName" class="info-input" placeholder="名前">
                    <input type="text" id="newCompany" class="info-input" placeholder="会社名">
                    <input type="text" id="newDept" class="info-input" placeholder="部署名">
                    <input type="text" id="newTitle" class="info-input" placeholder="役職">
                    <input type="text" id="newEmail" class="info-input" placeholder="メールアドレス">
                    <input type="text" id="newPhone" class="info-input" placeholder="電話番号">
                    <textarea id="newNotes" class="info-input" style="height:80px" placeholder="備考"></textarea>
                    <button class="register-button" onclick="registerCard()">登録</button>
                </div>`;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function registerCard() {
            const newUser = {
                name: document.getElementById('newName').value,
                company: document.getElementById('newCompany').value,
                dept: document.getElementById('newDept').value,
                title: document.getElementById('newTitle').value,
                email: document.getElementById('newEmail').value,
                phone: document.getElementById('newPhone').value,
                notes: document.getElementById('newNotes').value,
                icon: 'user-3.png'
            };
            userData.push(newUser);
            renderCards();
            closeModal();
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        document.getElementById('searchBar').addEventListener('keypress', (e) => { if(e.key === 'Enter') alert('検索: ' + e.target.value); });
        const sortBtn = document.getElementById('sortBtn');
        const sortOptions = document.getElementById('sortOptions');
        sortBtn.onclick = (e) => { e.stopPropagation(); sortOptions.style.display = sortOptions.style.display === 'block' ? 'none' : 'block'; };
        window.onclick = () => { sortOptions.style.display = 'none'; };
        renderCards();
    </script>
</body>
</html>
