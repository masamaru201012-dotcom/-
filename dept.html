<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - 部署</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }
        
        /* サイドバー統一設定 */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; z-index: 3000; }
        .logo-area { padding: 0 20px 80px; text-align: center; box-sizing: border-box; }
        .logo-area img { width: 100%; height: auto; }
        .nav-item { display: flex; align-items: center; padding: 0 30px; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 18px; height: 90px; box-sizing: border-box; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.15); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .nav-icon { width: 38px; height: 38px; margin-right: 18px; object-fit: contain; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .filter-container { padding: 30px 50px 10px; display: flex; flex-wrap: wrap; gap: 12px; }
        .filter-btn { padding: 10px 24px; border-radius: 25px; border: 1px solid #ddd; background: white; color: #666; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { background: #6fceca; color: white; border-color: #6fceca; box-shadow: 0 4px 10px rgba(111, 206, 202, 0.3); }

        .card-grid { padding: 20px 50px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 20px; cursor: pointer; }
        .thumb-box { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0faff; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #e0f4f3; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 30px; padding: 40px; box-sizing: border-box; }
        .info-group { margin-bottom: 18px; }
        .info-label { font-size: 12px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
        .info-value { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #eee; background: #f8f9fa; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png" class="nav-icon"><span>キーワード</span></a>
        <a href="dept.html" class="nav-item active"><img src="icon-dept.png" class="nav-icon"><span>部署</span></a>
        <a href="area.html" class="nav-item"><img src="icon-area.png" class="nav-icon"><span>エリア</span></a>
    </div>
    <div class="main-content">
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterDept('すべて', this)">すべて</button>
            <button class="filter-btn" onclick="filterDept('制作技術部', this)">制作技術部</button>
            <button class="filter-btn" onclick="filterDept('営業部', this)">営業部</button>
            <button class="filter-btn" onclick="filterDept('総務部', this)">総務部</button>
            <button class="filter-btn" onclick="filterDept('報道部', this)">報道部</button>
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()"><div id="modalInner"></div></div>
    </div>
    <script>
        let userData = JSON.parse(localStorage.getItem('myCards')) || [];
        let currentDept = 'すべて';

        function filterDept(dept, btn) {
            currentDept = dept;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            userData.filter(u => currentDept === 'すべて' || u.dept === currentDept).forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetail(user);
                card.innerHTML = `<div class="thumb-box"><img src="${user.icon.replace('./','')}"></div><div style="font-weight:bold; font-size:20px;">${user.name}</div>`;
                grid.appendChild(card);
            });
        }

        function openDetail(u) {
            const inner = document.getElementById('modalInner');
            inner.innerHTML = `
                <div style="text-align:center; padding-bottom:20px; border-bottom:2px solid #f0faff; margin-bottom:25px;">
                    <div class="thumb-box" style="margin: 0 auto 15px; width:100px; height:100px;"><img src="${u.icon.replace('./','')}"></div>
                    <div style="font-size:24px; font-weight:bold;">${u.name}</div>
                </div>
                <div class="info-group"><div class="info-label">部署名</div><div class="info-value">${u.dept || '---'}</div></div>
                <div class="info-group"><div class="info-label">備考</div><div class="info-value">${u.memo || '---'}</div></div>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        window.onload = updateDisplay;
    </script>
</body>
</html>
