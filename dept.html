<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - 部署</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #f5f7f9; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); color: white; display: flex; flex-direction: column; padding-top: 60px; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: white; text-decoration: none; opacity: 0.8; }
        .nav-item img { width: 24px; margin-right: 15px; }
        .nav-item.active { opacity: 1; font-weight: bold; background: rgba(255,255,255,0.1); }
        .user-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255,255,255,0.2); }
        .container { flex: 1; display: flex; overflow: hidden; }
        .side-list { width: 250px; background: white; border-right: 1px solid #eee; padding: 20px; overflow-y: auto; }
        .dept-item { padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 10px; font-weight: bold; color: #555; }
        .dept-item:hover { background: #f0faff; color: #5eabd5; }
        .main-view { flex: 1; padding: 40px; overflow-y: auto; }
        .card-list { display: flex; flex-direction: column; gap: 15px; max-width: 500px; }
        .card { background: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><img src="logo.png"></div>
        <a href="index.html" class="nav-item"><img src="icon-keyword.png">キーワード</a>
        <a href="dept.html" class="nav-item active"><img src="icon-dept.png">部署</a>
        <a href="area.html" class="nav-item"><img src="icon-area.png">エリア</a>
        <div class="user-area"><div id="uName" style="font-weight:bold;">---</div></div>
    </div>
    <div class="container">
        <div class="side-list" id="dList"></div>
        <div class="main-view">
            <div style="display:flex; align-items:center; gap:15px; border-bottom:2px solid #6fceca; padding-bottom:15px; margin-bottom:25px;">
                <img src="icon-dept.png" style="width:32px;">
                <h2 id="title" style="margin:0; font-size:20px; color:#444;">部署を選択してください</h2>
            </div>
            <div id="grid" class="card-list"></div>
        </div>
    </div>
    <script>
        const depts = ["報道制作部", "制作技術部", "放送技術部", "本社営業部", "名古屋支社", "東京支社", "大阪支社"];
        const dList = document.getElementById('dList');
        depts.forEach(d => {
            dList.innerHTML += `<div class="dept-item" onclick="sel('${d}')"><img src="icon-dept.png" style="width:22px;">${d}</div>`;
        });
        function sel(name) {
            document.getElementById('title').innerText = name + "の名刺一覧";
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            const data = JSON.parse(localStorage.getItem('myCards')) || [];
            data.filter(u => u.ownerDept === name).forEach(u => {
                grid.innerHTML += `<div class="card"><img src="${u.icon||'user-1.png'}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;"><div><b>${u.name}</b><br><small>${u.company}</small></div></div>`;
            });
        }
        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) document.getElementById('uName').innerText = user.name + " (" + user.dept + ")";
        };
    </script>
</body>
</html>
