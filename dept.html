<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名刺くらうど - 部署</title>
    <style>
        /* 基本スタイルは共通 */
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #f5f7f9; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca, #5eabd5); color: white; padding-top: 60px; }
        .nav-item { padding: 25px 30px; display: block; color: white; text-decoration: none; opacity: 0.7; }
        .nav-item.active { opacity: 1; font-weight: bold; background: rgba(255,255,255,0.2); border-radius: 0 30px 30px 0; margin-right: 20px; }
        .main-content { flex: 1; padding: 50px; }

        /* ファイル型デザイン */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 40px; }
        .file-box { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .file-box:hover { transform: translateY(-5px); }

        .file-shape {
            width: 140px; height: 100px;
            background: #ffd863;
            border-radius: 0 15px 10px 10px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: center;
        }
        .file-shape::before {
            content: ""; position: absolute; top: -12px; left: 0;
            width: 60px; height: 15px; background: #ffd863; border-radius: 8px 8px 0 0;
        }
        .file-label { margin-top: 15px; font-weight: bold; color: #555; text-align: center; }
        .dept-text { font-size: 12px; color: #8a732d; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="nav-item">🔍 キーワード</a>
        <a href="dept.html" class="nav-item active">📁 部署</a>
        <a href="area.html" class="nav-item">📍 エリア</a>
    </div>
    <div class="main-content">
        <h1 style="color:#555; margin-bottom:40px;">部署から探す</h1>
        <div class="file-grid">
            <div class="file-box">
                <div class="file-shape"><span class="dept-text">制作技術部</span></div>
                <div class="file-label">制作技術部</div>
            </div>
            <div class="file-box">
                <div class="file-shape"><span class="dept-text">報道制作部</span></div>
                <div class="file-label">報道制作部</div>
            </div>
            <div class="file-box">
                <div class="file-shape"><span class="dept-text">スポーツ制作部</span></div>
                <div class="file-label">スポーツ制作部</div>
            </div>
            <div class="file-box">
                <div class="file-shape"><span class="dept-text">営業部</span></div>
                <div class="file-label">営業部</div>
            </div>
        </div>
    </div>
</body>
</html>
