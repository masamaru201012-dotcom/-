<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺くらうど - 部署別</title>
    <style>
        /* 1. チラつき防止 */
        html { visibility: hidden; }

        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f5f7f9; overflow: hidden; }

        /* サイドバー：index.htmlと100%同一のCSS */
        .sidebar { width: 280px; background: linear-gradient(180deg, #6fceca 0%, #5eabd5 100%); display: flex; flex-direction: column; padding: 60px 0 0 0; color: white; flex-shrink: 0; }
        .logo-area { padding: 0 20px 80px; text-align: center; }
        .logo-area img { width: 100%; transform: scale(1.1); }
        
        .nav-item { display: flex; align-items: center; padding: 20px 30px; color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 18px; }
        .nav-item.active { color: #ffffff; font-weight: bold; background: rgba(255, 255, 255, 0.2); border-radius: 0 30px 30px 0; margin-right: 20px; }
        
        /* アイコンが潰れないための重要な設定 */
        .nav-item img { width: 24px; height: 24px; margin-right: 15px; object-fit: contain; flex-shrink: 0; }
        
        .user-profile-area { margin-top: auto; padding: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.05); }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #ffffff; }
        .logout-btn { font-size: 12px; color: rgba(255, 255, 255, 0.6); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; outline: none; }

        /* メインコンテンツ */
        #mainApp { display: none; width: 100%; height: 100%; }
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 60px; }
        .page-title { font-size: 24px; font-weight: bold; color: #444; margin-bottom: 40px; }

        /* フォルダグリッド */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; max-width: 1100px; }
        .folder-card { background: white; border-radius: 15px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; border: 1px solid #eef2f6; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-decoration: none; }
        .folder-card:hover { transform: translateY(-5px); border-color: #6fceca; box-shadow: 0 10px 25px rgba(111, 206, 202, 0.15); }
        .folder-icon { width: 80px; height: 60px; border-radius: 4px 10px 4px 4px; margin-bottom: 20px; position: relative; background: linear-gradient(135deg, #a5d6d4 0%, #6fceca 100%); }
        .folder-icon::before { content: ""; position: absolute; top: -8px; left: 0; width: 35px; height: 10px; background: #5eabd5; border-radius: 3px 3px 0 0; }
        .dept-name { font-weight: bold; color: #444; font-size: 16px; text-align: center; }
        .card-count { font-size: 12px; color: #999; margin-top: 8px; }

        /* スマホ用下ヘッダー */
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 1px solid #eef2f6; justify-content: space-around; align-items: center; z-index: 1000; box-sizing: border-box; padding-bottom: env(safe-area-inset-bottom); }
        .mobile-nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 11px; font-weight: bold; flex: 1; }
        .mobile-nav-item img { width: 24px; height: 24px; margin-bottom: 4px; opacity: 0.4; object-fit: contain; }
        .mobile-nav-item.active { color: #6fceca; }
        .mobile-nav-item.active img { opacity: 1; }

        @media screen and (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-container { padding: 30px 20px 100px; }
        }
    </style>
</head>
<body>
    <div id="mainApp">
        <div class="sidebar">
            <div class="logo-area"><img src="logo.png"></div>
            <a href="index.html" class="nav-item"><img src="icon-keyword.png"><span>キーワード</span></a>
            <a href="dept.html" class="nav-item active"><img src="icon-dept.png"><span>部署</span></a>
            <a href="area.html" class="nav-item"><img src="icon-area.png"><span>エリア</span></a>
            
            <div class="user-profile-area">
                <div class="user-name">清水　茉咲 (制作技術部)</div>
                <button class="logout-btn" onclick="doLogout()">ログアウト</button>
            </div>
        </div>

        <div class="main-container">
            <div class="page-title">部署別</div>
            <div class="folder-grid" id="folderGrid"></div>
        </div>

        <div class="mobile-nav">
            <a href="index.html" class="mobile-nav-item"><img src="icon-keyword.png"><span>キーワード</span></a>
            <a href="dept.html" class="mobile-nav-item active"><img src="icon-dept.png"><span>部署</span></a>
            <a href="area.html" class="mobile-nav-item"><img src="icon-area.png"><span>エリア</span></a>
        </div>
    </div>

    <script>
        function checkLogin() {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('mainApp').style.display = 'flex';
                renderFolders();
            } else {
                window.location.href = 'index.html';
            }
            document.documentElement.style.visibility = 'visible';
        }

        function doLogout() {
            sessionStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        const departments = ["総務部", "本社営業部", "東京支社", "大阪支社", "名古屋支社", "事業部", "編成部", "放送部", "業務部", "報道制作部", "制作技術部", "放送技術部"];

        function renderFolders() {
            const grid = document.getElementById('folderGrid');
            grid.innerHTML = "";
            departments.forEach(dept => {
                const card = document.createElement('a');
                card.href = "#";
                card.className = 'folder-card';
                card.innerHTML = `<div class="folder-icon"></div><div class="dept-name">${dept}</div><div class="card-count">名刺を読み込む</div>`;
                card.onclick = (e) => { e.preventDefault(); alert(`${dept}フォルダを開きます。`); };
                grid.appendChild(card);
            });
        }
        checkLogin();
    </script>
</body>
</html>
